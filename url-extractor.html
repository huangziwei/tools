<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>URL Extractor</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111418;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --panel: #f8fafc;
    --panel-active: #eff6ff;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --code-bg: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0d10;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --border: #262a30;
      --border-strong: #3a3f47;
      --panel: #14171c;
      --panel-active: #17253f;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --code-bg: #1a1f26;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main { width: 100%; max-width: 620px; }

  h1 { font-size: 1.75rem; font-weight: 600; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
  p.lead { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  label.field-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--fg);
  }

  input[type="text"] {
    width: 100%;
    padding: 0.65rem 0.85rem;
    font-size: 0.95rem;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.7; }

  textarea {
    width: 100%;
    padding: 0.65rem 0.85rem;
    font-size: 0.85rem;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
    line-height: 1.5;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  textarea::placeholder { color: var(--muted); opacity: 0.7; font-family: inherit; }

  .section { margin-top: 1.5rem; }

  .btn-secondary {
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  .drop-zone {
    border: 2px dashed var(--border-strong);
    border-radius: 10px;
    padding: 0.75rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone.has-data {
    border-style: solid;
    border-color: var(--border);
  }
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .drop-zone textarea {
    border: none;
    background: transparent;
    padding: 0;
    resize: none;
    cursor: default;
  }
  .drop-zone textarea:focus { box-shadow: none; }
  .drop-zone textarea::placeholder {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 0.9rem;
  }
  .drop-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .attr-chips {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .attr-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.7rem;
    font-size: 0.82rem;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--code-bg);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .attr-chip:hover {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .attr-chip.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }
  .attr-chip .chip-count {
    font-size: 0.72rem;
    opacity: 0.7;
  }

  .scan-empty {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
  }

  .help-text {
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .results-area {
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--panel);
    overflow: hidden;
  }
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.85rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    font-weight: 500;
  }
  .results-count {
    color: var(--muted);
    font-weight: 400;
    font-size: 0.82rem;
  }
  .results-list {
    max-height: 400px;
    overflow-y: auto;
    padding: 0;
    margin: 0;
    list-style: none;
  }
  .results-list li {
    padding: 0.5rem 0.85rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    word-break: break-all;
    line-height: 1.4;
  }
  .results-list li:last-child { border-bottom: none; }
  .results-list li:hover { background: var(--panel-active); }

  .empty-state {
    padding: 2rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
  }

  footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <h1>URL Extractor</h1>
  <p class="lead">Paste page source to extract URLs. Everything runs in your browser.</p>

  <div>
    <label class="field-label" for="htmlInput">HTML source</label>
    <div class="drop-zone" id="dropZone">
      <textarea id="htmlInput" rows="3" placeholder="Paste HTML source here (Cmd+U / Ctrl+U in browser to view source)" readonly></textarea>
      <input type="file" id="fileInput" accept=".html,.htm,.txt,.xml" style="display:none">
      <div class="drop-actions">
        <button class="btn-secondary" id="browseBtn">Browse file</button>
        <button class="btn-secondary" id="clearHtmlBtn" style="display:none">Clear</button>
      </div>
    </div>
  </div>

  <div class="section" id="attrsSection" style="display:none">
    <label class="field-label">Found in source</label>
    <div class="attr-chips" id="attrChips"></div>
  </div>

  <div class="section" id="filterSection" style="display:none">
    <label class="field-label">Filter by type</label>
    <div class="attr-chips" id="typeChips"></div>
    <label class="field-label" for="filterInput" style="margin-top:0.75rem">Filter by text</label>
    <input type="text" id="filterInput" placeholder="e.g. .mp3, .jpg, https://cdn">
  </div>

  <div class="results-area" id="resultsArea" style="display:none">
    <div class="results-header">
      <span>Results</span>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <ul class="results-list" id="resultsList"></ul>
    <div style="padding: 0.5rem 0.85rem; border-top: 1px solid var(--border);">
      <button class="btn-secondary" id="copyAllBtn">Copy all</button>
    </div>
  </div>

  <footer>
    <!-- TOOL_META_START --><!-- TOOL_META_END -->
  </footer>
</main>

<script>
  var htmlInput = document.getElementById('htmlInput');
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var browseBtn = document.getElementById('browseBtn');
  var clearHtmlBtn = document.getElementById('clearHtmlBtn');
  var attrsSection = document.getElementById('attrsSection');
  var attrChips = document.getElementById('attrChips');
  var filterSection = document.getElementById('filterSection');
  var filterInput = document.getElementById('filterInput');
  var resultsArea = document.getElementById('resultsArea');
  var resultsCount = document.getElementById('resultsCount');
  var resultsList = document.getElementById('resultsList');
  var copyAllBtn = document.getElementById('copyAllBtn');

  var typeChips = document.getElementById('typeChips');

  var rawHtml = '';
  var parsedDoc = null;
  var scannedAttrs = []; // [{attr, selector, count, values}]
  var activeAttr = null;
  var activeType = null;
  var currentResults = [];

  var FILE_TYPES = [
    { label: 'images', exts: ['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'ico', 'bmp', 'avif'] },
    { label: 'audio', exts: ['mp3', 'aac', 'ogg', 'wav', 'flac', 'wma', 'm4a', 'opus'] },
    { label: 'video', exts: ['mp4', 'webm', 'mkv', 'avi', 'mov', 'm3u8', 'ts'] },
    { label: 'docs', exts: ['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'csv', 'txt'] },
    { label: 'scripts', exts: ['js', 'mjs', 'css', 'json', 'xml', 'wasm'] },
    { label: 'fonts', exts: ['woff', 'woff2', 'ttf', 'otf', 'eot'] },
  ];

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function looksLikeUrl(val) {
    if (/^https?:\/\//.test(val)) return true;
    if (/^\/\//.test(val)) return true;
    if (/^data:/.test(val)) return true;
    if (/\.[a-z0-9]{2,5}(\?|#|$)/i.test(val) && /\//.test(val)) return true;
    return false;
  }

  // Scan parsed doc for all attributes containing URL-like values
  function scanForUrls(doc) {
    var attrMap = new Map(); // attrName -> Set of unique values

    var all = doc.querySelectorAll('*');
    for (var i = 0; i < all.length; i++) {
      var el = all[i];
      for (var j = 0; j < el.attributes.length; j++) {
        var a = el.attributes[j];
        if (!looksLikeUrl(a.value)) continue;
        if (!attrMap.has(a.name)) attrMap.set(a.name, new Set());
        attrMap.get(a.name).add(a.value);
      }
    }

    var results = [];
    attrMap.forEach(function(values, attr) {
      results.push({
        attr: attr,
        selector: '[' + attr + ']',
        count: values.size,
        values: Array.from(values)
      });
    });

    // Sort: most unique URLs first
    results.sort(function(a, b) { return b.count - a.count; });
    return results;
  }

  function renderChips() {
    attrChips.innerHTML = '';
    if (scannedAttrs.length === 0) {
      var span = document.createElement('span');
      span.className = 'scan-empty';
      span.textContent = 'No URL-like attributes found.';
      attrChips.appendChild(span);
      return;
    }

    scannedAttrs.forEach(function(entry) {
      var btn = document.createElement('button');
      btn.className = 'attr-chip' + (activeAttr === entry.attr ? ' active' : '');
      btn.innerHTML = entry.attr + ' <span class="chip-count">(' + entry.count + ')</span>';
      btn.dataset.attr = entry.attr;
      attrChips.appendChild(btn);
    });
  }

  function matchesType(url, type) {
    if (!type) return true;
    var exts = type.exts;
    // Strip query/hash, get extension
    var clean = url.split(/[?#]/)[0];
    var dot = clean.lastIndexOf('.');
    if (dot === -1) return false;
    var ext = clean.substring(dot + 1).toLowerCase();
    return exts.indexOf(ext) !== -1;
  }

  function renderTypeChips(values) {
    typeChips.innerHTML = '';

    // "all" chip
    var allBtn = document.createElement('button');
    allBtn.className = 'attr-chip' + (!activeType ? ' active' : '');
    allBtn.textContent = 'all';
    allBtn.dataset.type = '';
    typeChips.appendChild(allBtn);

    FILE_TYPES.forEach(function(type) {
      var count = values.filter(function(v) { return matchesType(v, type); }).length;
      if (count === 0) return;
      var btn = document.createElement('button');
      btn.className = 'attr-chip' + (activeType && activeType.label === type.label ? ' active' : '');
      btn.innerHTML = type.label + ' <span class="chip-count">(' + count + ')</span>';
      btn.dataset.type = type.label;
      typeChips.appendChild(btn);
    });
  }

  function showResults(values) {
    var textFilter = filterInput.value.trim().toLowerCase();
    var filtered = values.filter(function(v) {
      if (activeType && !matchesType(v, activeType)) return false;
      if (textFilter && v.toLowerCase().indexOf(textFilter) === -1) return false;
      return true;
    });

    currentResults = filtered;
    resultsList.innerHTML = '';

    if (filtered.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = (textFilter || activeType) ? 'No results match filter.' : 'No matches found.';
      resultsList.appendChild(empty);
    } else {
      filtered.forEach(function(val) {
        var li = document.createElement('li');
        li.textContent = val;
        resultsList.appendChild(li);
      });
    }

    resultsCount.textContent = filtered.length + ' found';
    resultsArea.style.display = '';
    filterSection.style.display = '';
  }

  function selectAttr(attrName) {
    activeAttr = attrName;
    activeType = null;
    renderChips();
    var entry = scannedAttrs.find(function(e) { return e.attr === attrName; });
    if (entry) {
      renderTypeChips(entry.values);
      showResults(entry.values);
    }
  }

  function setHtmlData(text) {
    rawHtml = text;
    var lines = text.split('\n').length;
    var size = new Blob([text]).size;
    htmlInput.value = '[Pasted ' + lines.toLocaleString() + ' lines \u00b7 ' + formatSize(size) + ']';
    dropZone.classList.add('has-data');
    clearHtmlBtn.style.display = '';

    // Parse and scan
    var parser = new DOMParser();
    parsedDoc = parser.parseFromString(rawHtml, 'text/html');
    scannedAttrs = scanForUrls(parsedDoc);
    activeAttr = null;
    attrsSection.style.display = '';
    resultsArea.style.display = 'none';
    filterSection.style.display = 'none';
    filterInput.value = '';
    renderChips();
  }

  function clearHtmlData() {
    rawHtml = '';
    parsedDoc = null;
    scannedAttrs = [];
    activeAttr = null;
    currentResults = [];
    htmlInput.value = '';
    dropZone.classList.remove('has-data');
    clearHtmlBtn.style.display = 'none';
    attrsSection.style.display = 'none';
    filterSection.style.display = 'none';
    resultsArea.style.display = 'none';
    filterInput.value = '';
  }

  // Intercept paste
  htmlInput.addEventListener('paste', function(e) {
    e.preventDefault();
    var text = (e.clipboardData || window.clipboardData).getData('text');
    if (text) setHtmlData(text);
  });
  htmlInput.addEventListener('click', function() { htmlInput.focus(); });

  // File browse
  browseBtn.addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function() {
    var file = fileInput.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) { setHtmlData(e.target.result); };
    reader.readAsText(file);
  });

  // Drag-and-drop
  ['dragenter', 'dragover'].forEach(function(name) {
    dropZone.addEventListener(name, function(e) {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(function(name) {
    dropZone.addEventListener(name, function(e) {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('drag-over');
    });
  });
  dropZone.addEventListener('drop', function(e) {
    var file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) {
      var reader = new FileReader();
      reader.onload = function(ev) { setHtmlData(ev.target.result); };
      reader.readAsText(file);
    }
  });

  clearHtmlBtn.addEventListener('click', clearHtmlData);

  // Chip click
  attrChips.addEventListener('click', function(e) {
    var btn = e.target.closest('.attr-chip');
    if (!btn) return;
    selectAttr(btn.dataset.attr);
  });

  // Type chip click
  typeChips.addEventListener('click', function(e) {
    var btn = e.target.closest('.attr-chip');
    if (!btn) return;
    var label = btn.dataset.type;
    activeType = label ? FILE_TYPES.find(function(t) { return t.label === label; }) : null;
    var entry = scannedAttrs.find(function(e) { return e.attr === activeAttr; });
    if (entry) {
      renderTypeChips(entry.values);
      showResults(entry.values);
    }
  });

  // Text filter re-applies to current selection
  filterInput.addEventListener('input', function() {
    if (!activeAttr) return;
    var entry = scannedAttrs.find(function(e) { return e.attr === activeAttr; });
    if (entry) showResults(entry.values);
  });

  // Copy all
  copyAllBtn.addEventListener('click', function() {
    if (!currentResults.length) return;
    navigator.clipboard.writeText(currentResults.join('\n')).then(function() {
      var orig = copyAllBtn.textContent;
      copyAllBtn.textContent = 'Copied!';
      setTimeout(function() { copyAllBtn.textContent = orig; }, 1500);
    });
  });

  // Prevent browser opening dropped files
  window.addEventListener('dragover', function(e) { e.preventDefault(); });
  window.addEventListener('drop', function(e) { e.preventDefault(); });
</script>
</body>
</html>
