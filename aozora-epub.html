<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aozora to EPUB</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111418;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --panel: #f8fafc;
    --panel-active: #eff6ff;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --code-bg: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0d10;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --border: #262a30;
      --border-strong: #3a3f47;
      --panel: #14171c;
      --panel-active: #17253f;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --code-bg: #1a1f26;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main { width: 100%; max-width: 620px; }

  h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.25rem; }
  .lead { color: var(--muted); margin: 0 0 1.75rem; font-size: 0.95rem; }

  .field-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }

  .btn-secondary {
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  .btn-primary {
    padding: 0.6rem 1.5rem;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }

  .drop-zone {
    border: 2px dashed var(--border-strong);
    border-radius: 10px;
    padding: 0.75rem;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .drop-zone.has-data {
    border-style: solid;
    border-color: var(--border);
    cursor: default;
  }
  .drop-zone:not(.has-data):hover {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .drop-zone-label {
    display: block;
    padding: 1.5rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }
  .drop-zone.has-data .drop-zone-label { display: none; }
  .drop-zone-info {
    display: none;
    padding: 0.5rem 0;
    font-size: 0.85rem;
    color: var(--fg);
  }
  .drop-zone.has-data .drop-zone-info { display: block; }
  .drop-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .meta-fields {
    display: none;
    margin-top: 1.5rem;
  }
  .meta-fields.visible { display: block; }
  .meta-fields input {
    width: 100%;
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
    font-family: inherit;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    outline: none;
    margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  .meta-fields input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
  }

  .action-row {
    display: none;
    margin-top: 1.5rem;
    gap: 0.75rem;
    align-items: center;
  }
  .action-row.visible { display: flex; }

  .status {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--muted);
    display: none;
  }
  .status.visible { display: block; }
  .status.error { color: #ef4444; }

  .cover-section {
    display: none;
    margin-top: 1.5rem;
  }
  .cover-section.visible { display: block; }
  .cover-row {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .cover-preview {
    width: 150px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .cover-preview:hover {
    border-color: var(--accent);
  }
  .cover-preview.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .cover-preview img,
  .cover-preview svg {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
  }
  .cover-actions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .preview {
    display: none;
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .preview.visible { display: block; }
  .preview-header {
    padding: 0.5rem 0.85rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .preview-body {
    padding: 1rem;
    font-size: 0.85rem;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.7;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
  }
  .preview-body rt { font-size: 0.55em; }

  footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--fg);
    color: var(--bg);
    padding: 0.55rem 1.1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>
<main>
  <h1>Aozora to EPUB</h1>
  <p class="lead">Convert Aozora Bunko files to vertical-layout EPUB. Everything runs in your browser.</p>

  <div>
    <label class="field-label">Aozora file</label>
    <div class="drop-zone" id="dropZone">
      <span class="drop-zone-label">Drop .html, .txt, or .zip here &mdash; or click to browse</span>
      <div class="drop-zone-info" id="fileInfo"></div>
      <input type="file" id="fileInput" accept=".html,.htm,.txt,.zip" style="display:none">
      <div class="drop-actions">
        <button class="btn-secondary" id="clearBtn" style="display:none">Clear</button>
      </div>
    </div>
  </div>

  <div class="meta-fields" id="metaFields">
    <label class="field-label" for="titleInput">Title</label>
    <input type="text" id="titleInput" placeholder="Book title">
    <label class="field-label" for="authorInput">Author</label>
    <input type="text" id="authorInput" placeholder="Author name">
  </div>

  <div class="cover-section" id="coverSection">
    <label class="field-label">Cover</label>
    <div class="cover-row">
      <div class="cover-preview" id="coverPreview" title="Click or drop image to replace"></div>
      <div class="cover-actions">
        <button class="btn-secondary" id="resetCoverBtn" style="display:none">Reset</button>
      </div>
      <input type="file" id="coverFileInput" accept="image/*" style="display:none">
    </div>
  </div>

  <div class="action-row" id="actionRow">
    <button class="btn-primary" id="convertBtn">Download EPUB</button>
  </div>

  <div class="status" id="status"></div>

  <div class="preview" id="preview">
    <div class="preview-header">Preview</div>
    <div class="preview-body" id="previewBody"></div>
  </div>

  <footer>
    <!-- TOOL_META_START --><!-- TOOL_META_END -->
  </footer>
</main>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
  var dropZone = document.getElementById('dropZone');
  var fileInput = document.getElementById('fileInput');
  var fileInfo = document.getElementById('fileInfo');
  var clearBtn = document.getElementById('clearBtn');
  var metaFields = document.getElementById('metaFields');
  var titleInput = document.getElementById('titleInput');
  var authorInput = document.getElementById('authorInput');
  var actionRow = document.getElementById('actionRow');
  var convertBtn = document.getElementById('convertBtn');
  var statusEl = document.getElementById('status');
  var preview = document.getElementById('preview');
  var previewBody = document.getElementById('previewBody');
  var toast = document.getElementById('toast');
  var coverSection = document.getElementById('coverSection');
  var coverPreview = document.getElementById('coverPreview');
  var resetCoverBtn = document.getElementById('resetCoverBtn');
  var coverFileInput = document.getElementById('coverFileInput');

  // Parsed state
  var bookTitle = '';
  var bookAuthor = '';
  var bodyXhtml = '';   // inner XHTML of main content
  var bookToc = [];     // [{id, level, text}]
  var bookColophon = '';
  var images = [];      // [{name, data (Uint8Array), mime}]
  var customCover = null; // {data: Uint8Array, mime: string} or null for default SVG

  // --- Decoding ---

  function decodeShiftJIS(buf) {
    try {
      return new TextDecoder('shift_jis').decode(buf);
    } catch (e) {
      return new TextDecoder('utf-8').decode(buf);
    }
  }

  function detectAndDecode(buf) {
    var bytes = new Uint8Array(buf);
    // BOM check
    if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF)
      return new TextDecoder('utf-8').decode(buf);
    // Try UTF-8 first — if it has encoding errors, fall back to Shift-JIS
    var utf8 = new TextDecoder('utf-8', { fatal: true });
    try {
      return utf8.decode(buf);
    } catch (e) {
      return decodeShiftJIS(buf);
    }
  }

  // --- Aozora TXT parser ---

  // Image filenames referenced by ［＃...（filename）入る］— collected during parse
  var referencedImages = [];

  function parseTxt(text) {
    referencedImages = [];
    var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');

    // First non-empty line = title, second = author
    var headerLines = [];
    var i = 0;
    for (; i < lines.length && headerLines.length < 2; i++) {
      var l = lines[i].trim();
      if (l) headerLines.push(l);
    }
    var title = headerLines[0] || '';
    var author = headerLines[1] || '';

    // Skip to last separator line (end of header block)
    var bodyStart = 0;
    for (var j = 0; j < lines.length; j++) {
      if (/^-{5,}/.test(lines[j].trim())) {
        bodyStart = j + 1;
      }
    }
    // Find trailing bibliographical section and extract colophon
    var bodyEnd = lines.length;
    for (var k = lines.length - 1; k > bodyStart; k--) {
      if (/^底本[：:]/.test(lines[k].trim())) {
        bodyEnd = k;
        break;
      }
    }
    // Parse colophon (底本 to end, before 青空文庫作成ファイル)
    var colophonLines = [];
    for (var c = bodyEnd; c < lines.length; c++) {
      var cl = lines[c].trim();
      if (/^(青空文庫作成ファイル|このファイルは)/.test(cl)) break;
      if (cl) colophonLines.push(cl);
    }
    var colophon = colophonLines.join('\n');

    var bodyLines = lines.slice(bodyStart, bodyEnd);
    while (bodyLines.length && !bodyLines[0].trim()) bodyLines.shift();
    while (bodyLines.length && !bodyLines[bodyLines.length - 1].trim()) bodyLines.pop();

    // Multi-line state — use CSS class instead of <blockquote> to avoid nesting issues
    var indentLevel = 0;
    var headingId = 0;
    var tocEntries = []; // [{id, level, text}]
    var html = '';

    for (var n = 0; n < bodyLines.length; n++) {
      var raw = bodyLines[n];

      // Block indent start/end
      var indentStart = raw.match(/［＃ここから[０-９0-9]+字下げ[^］]*］/);
      if (indentStart) {
        indentLevel++;
        raw = raw.replace(/［＃ここから[０-９0-9]+字下げ[^］]*］/, '');
        if (!raw.trim()) continue;
      }
      if (/［＃ここで字下げ終わり］/.test(raw)) {
        raw = raw.replace(/［＃ここで字下げ終わり］/, '');
        if (raw.trim()) {
          html += '<p class="indent">' + convertAozoraLine(raw) + '</p>\n';
        }
        indentLevel = 0;
        continue;
      }

      // Page/section breaks: ［＃改ページ］ ［＃改丁］ ［＃ページの左右中央］
      if (/［＃(改ページ|改丁|ページの左右中央)］/.test(raw)) {
        indentLevel = 0;
        if (/^［＃(改ページ|改丁|ページの左右中央)］\s*$/.test(raw.trim())) continue;
        raw = raw.replace(/［＃(改ページ|改丁|ページの左右中央)］/g, '');
      }

      // Reset indent before headings
      if (/［＃[大中小]見出し］/.test(raw)) indentLevel = 0;

      // Headings: ［＃大見出し］text［＃大見出し終わり］
      var headingMatch = raw.match(/［＃大見出し］(.+?)［＃大見出し終わり］/);
      if (headingMatch) {
        headingId++;
        var hText = headingMatch[1].replace(/［＃[^］]*］/g, '');
        var hPlain = hText.replace(/《[^》]*》/g, '').replace(/｜/g, '');
        tocEntries.push({ id: 'h' + headingId, level: 2, text: hPlain });
        html += '<h2 id="h' + headingId + '">' + convertAozoraLine(hText) + '</h2>\n';
        continue;
      }
      headingMatch = raw.match(/［＃中見出し］(.+?)［＃中見出し終わり］/);
      if (headingMatch) {
        headingId++;
        var hText = headingMatch[1].replace(/［＃「[^」]*」は底本では[^］]*］/g, '');
        var hPlain = hText.replace(/《[^》]*》/g, '').replace(/｜/g, '');
        tocEntries.push({ id: 'h' + headingId, level: 3, text: hPlain });
        html += '<h3 id="h' + headingId + '">' + convertAozoraLine(hText) + '</h3>\n';
        continue;
      }
      headingMatch = raw.match(/［＃小見出し］(.+?)［＃小見出し終わり］/);
      if (headingMatch) {
        headingId++;
        var hPlain = headingMatch[1].replace(/《[^》]*》/g, '').replace(/｜/g, '');
        tocEntries.push({ id: 'h' + headingId, level: 4, text: hPlain });
        html += '<h4 id="h' + headingId + '">' + convertAozoraLine(headingMatch[1]) + '</h4>\n';
        continue;
      }

      // Indentation prefix: ［＃N字下げ］ (single line)
      raw = raw.replace(/［＃[０-９0-9]+字下げ］/g, '');

      // Empty line → break
      if (!raw.trim()) {
        html += '<p><br/></p>\n';
        continue;
      }

      var pClass = indentLevel > 0 ? ' class="indent"' : '';
      html += '<p' + pClass + '>' + convertAozoraLine(raw) + '</p>\n';
    }

    return { title: title, author: author, body: html, toc: tocEntries, colophon: colophon };
  }

  function escapeXml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
  }

  function convertAozoraLine(line) {
    var s = escapeXml(line);

    // Images: ［＃description（filename、dimensions）入る］
    s = s.replace(/［＃([^（］]*)（([^、]+)、[^）]*）入る］/g, function(_, alt, filename) {
      referencedImages.push(filename);
      return '<img src="../images/' + filename + '" alt="' + alt.trim() + '"/>';
    });

    // Ruby: ｜base《reading》
    s = s.replace(/｜([^《]+?)《([^》]+)》/g, function(_, base, reading) {
      return '<ruby>' + base + '<rp>（</rp><rt>' + reading + '</rt><rp>）</rp></ruby>';
    });
    // Ruby: kanji《reading》 (no ｜ marker)
    s = s.replace(/([\u4E00-\u9FFF\u3400-\u4DBF\uF900-\uFAFF]+)《([^》]+)》/g, function(_, base, reading) {
      return '<ruby>' + base + '<rp>（</rp><rt>' + reading + '</rt><rp>）</rp></ruby>';
    });

    // Bouten: ［＃傍点］text［＃傍点終わり］
    s = s.replace(/［＃傍点］([^［]*)［＃傍点終わり］/g, function(_, text) {
      return '<em class="sesame">' + text + '</em>';
    });

    // Bold: ［＃太字］text［＃太字終わり］
    s = s.replace(/［＃太字］([^［]*)［＃太字終わり］/g, function(_, text) {
      return '<strong>' + text + '</strong>';
    });
    // Postfix bold: ［＃「text」は太字］— wraps the nearest preceding occurrence of text
    var boldTargets = [];
    s = s.replace(/［＃「([^」]+)」は太字］/g, function(_, text) {
      boldTargets.push(text);
      return '';
    });
    for (var bi = 0; bi < boldTargets.length; bi++) {
      var bt = boldTargets[bi];
      var escaped = bt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      // Replace last occurrence not already wrapped
      var idx = s.lastIndexOf(bt);
      if (idx !== -1) {
        s = s.substring(0, idx) + '<strong>' + bt + '</strong>' + s.substring(idx + bt.length);
      }
    }

    // Inline notes: ［＃割り注］text［＃割り注終わり］
    s = s.replace(/［＃割り注］([^［]*)［＃割り注終わり］/g, function(_, text) {
      return '<small>（' + text + '）</small>';
    });

    // Gaiji: ※［＃description、code］→ keep ※ as placeholder
    s = s.replace(/※［＃[^］]*］/g, '※');

    // Named special chars
    s = s.replace(/［＃感嘆符疑問符、[^\]]*］/g, '\u2049');
    s = s.replace(/［＃感嘆符二つ、[^\]]*］/g, '\u203C');
    s = s.replace(/［＃濁点付き片仮名ワ、[^\]]*］/g, '\u30F7');
    s = s.replace(/［＃アレフ、[^\]]*］/g, '\u05D0');

    // Strip editorial notes: ［＃「…」は底本では…］
    s = s.replace(/［＃「[^」]*」は底本では[^］]*］/g, '');
    // Heading refs already consumed at line level
    s = s.replace(/［＃「[^」]*」は[大中小]見出し］/g, '');

    // Remove remaining ［＃...］
    s = s.replace(/［＃[^］]*］/g, '');

    return s;
  }

  // --- Aozora XHTML parser ---

  function parseXhtml(text) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(text, 'text/html');

    // Extract metadata
    var titleMeta = doc.querySelector('meta[name="DC.Title"]');
    var authorMeta = doc.querySelector('meta[name="DC.Creator"]');
    var title = titleMeta ? titleMeta.getAttribute('content') : '';
    var author = authorMeta ? authorMeta.getAttribute('content') : '';

    // Fallback to visible header
    if (!title) {
      var h1 = doc.querySelector('.title, h1');
      if (h1) title = h1.textContent.trim();
    }
    if (!author) {
      var h2 = doc.querySelector('.author, h2');
      if (h2) author = h2.textContent.trim();
    }

    // Extract main text
    var mainText = doc.querySelector('.main_text, #main_text');
    if (!mainText) mainText = doc.querySelector('body');

    // Convert to paragraphs
    var html = mainText.innerHTML;
    // Aozora XHTML uses <br />\n for line breaks — convert to <p> blocks
    html = html.replace(/\r\n/g, '\n');
    // Split on <br> sequences
    var parts = html.split(/<br\s*\/?>\s*/gi).filter(function(p) {
      return p.trim().length > 0;
    });
    var body = parts.map(function(p) {
      return '<p>' + p.trim() + '</p>';
    }).join('\n');

    // Map sesame_dot class to our class
    body = body.replace(/class="sesame_dot"/g, 'class="sesame"');

    // Extract colophon from bibliographical_information div
    var bibDiv = doc.querySelector('.bibliographical_information');
    var colophon = '';
    if (bibDiv) {
      colophon = bibDiv.textContent.trim();
    }

    // Extract TOC from headings (Aozora XHTML rarely has them, but handle if present)
    var tocEntries = [];
    var hId = 0;
    // Headings in body won't exist in the simple XHTML format, but just in case
    var tmp = document.createElement('div');
    tmp.innerHTML = body;
    tmp.querySelectorAll('h2, h3, h4').forEach(function(h) {
      hId++;
      var id = 'h' + hId;
      var level = parseInt(h.tagName.charAt(1));
      tocEntries.push({ id: id, level: level, text: h.textContent.trim() });
      // Inject id into body string
      var tag = h.outerHTML;
      var tagged = tag.replace(/^<(h[234])/, '<$1 id="' + id + '"');
      body = body.replace(tag, tagged);
    });

    return { title: title, author: author, body: body, toc: tocEntries, colophon: colophon };
  }

  // --- EPUB generation ---

  function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function buildCoverSvg(title, author) {
    var w = 1050, h = 1500;
    var pad = 60;
    var bw = 2;
    var gap = 16;
    var bg = '#F2EBDA';
    var border = '#8B9E78';
    var fg = '#2C2418';
    var muted = '#6B6256';
    var font = "'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif";
    var innerW = w - (pad + gap) * 2 - 60; // usable text width with margin

    // Estimate text width: ~1em per CJK char, ~0.55em per latin char
    function estimateWidth(text, fontSize) {
      var w = 0;
      for (var i = 0; i < text.length; i++) {
        w += text.charCodeAt(i) > 0x7F ? fontSize : fontSize * 0.55;
      }
      return w;
    }

    // Find largest font size that fits within innerW, splitting into lines as needed
    var maxTitleFont = 100;
    var minTitleFont = 36;
    var titleFontSize, titleLines;

    for (titleFontSize = maxTitleFont; titleFontSize >= minTitleFont; titleFontSize -= 4) {
      // Try single line
      if (estimateWidth(title, titleFontSize) <= innerW) {
        titleLines = [title];
        break;
      }
      // Try two lines — split at best break point
      var best2 = splitLines(title, 2, titleFontSize);
      if (best2.maxW <= innerW) {
        titleLines = best2.lines;
        break;
      }
      // Try three lines
      var best3 = splitLines(title, 3, titleFontSize);
      if (best3.maxW <= innerW) {
        titleLines = best3.lines;
        break;
      }
    }
    if (!titleLines) {
      titleFontSize = minTitleFont;
      var best = splitLines(title, 3, titleFontSize);
      titleLines = best.lines;
    }

    function splitLines(text, n, fs) {
      var charsPerLine = Math.ceil(text.length / n);
      var lines = [];
      for (var i = 0; i < n; i++) {
        var seg = text.substring(i * charsPerLine, (i + 1) * charsPerLine);
        if (seg) lines.push(seg);
      }
      var maxW = 0;
      for (var j = 0; j < lines.length; j++) {
        var lw = estimateWidth(lines[j], fs);
        if (lw > maxW) maxW = lw;
      }
      return { lines: lines, maxW: maxW };
    }

    var titleSpacing = titleFontSize * 1.5;
    var titleBlockH = titleLines.length * titleSpacing;
    var titleY = h * 0.35 - titleBlockH / 2 + titleFontSize;

    // Author font — scale with title but capped
    var authorFontSize = Math.min(40, Math.max(26, Math.round(titleFontSize * 0.45)));

    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + w + ' ' + h + '" width="' + w + '" height="' + h + '">\n';
    svg += '<rect width="' + w + '" height="' + h + '" fill="' + bg + '"/>\n';
    svg += '<rect x="' + pad + '" y="' + pad + '" width="' + (w - pad * 2) + '" height="' + (h - pad * 2) + '" fill="none" stroke="' + border + '" stroke-width="' + bw + '"/>\n';
    svg += '<rect x="' + (pad + gap) + '" y="' + (pad + gap) + '" width="' + (w - (pad + gap) * 2) + '" height="' + (h - (pad + gap) * 2) + '" fill="none" stroke="' + border + '" stroke-width="' + (bw * 0.5) + '"/>\n';

    // Collection label
    svg += '<text x="' + (w / 2) + '" y="' + (pad + gap + 56) + '" text-anchor="middle" font-family="' + font + '" font-size="26" letter-spacing="0.5em" fill="' + muted + '">青空文庫</text>\n';

    // Title
    for (var ti = 0; ti < titleLines.length; ti++) {
      var ly = titleY + ti * titleSpacing;
      svg += '<text x="' + (w / 2) + '" y="' + ly + '" text-anchor="middle" font-family="' + font + '" font-size="' + titleFontSize + '" fill="' + fg + '">' + escapeXml(titleLines[ti]) + '</text>\n';
    }

    // Divider between title and author
    var divY = titleY + titleLines.length * titleSpacing + 16;
    svg += '<line x1="' + (w / 2 - 50) + '" y1="' + divY + '" x2="' + (w / 2 + 50) + '" y2="' + divY + '" stroke="' + border + '" stroke-width="1"/>\n';

    // Author
    var authorY = divY + 40 + authorFontSize;
    svg += '<text x="' + (w / 2) + '" y="' + authorY + '" text-anchor="middle" font-family="' + font + '" font-size="' + authorFontSize + '" fill="' + muted + '">' + escapeXml(author) + '</text>\n';

    svg += '</svg>';
    return svg;
  }

  function buildEpub(title, author, bodyXhtml, images, toc, colophon) {
    var zip = new JSZip();
    var uuid = generateUUID();

    // mimetype must be first, uncompressed
    zip.file('mimetype', 'application/epub+zip', { compression: 'STORE' });

    // container.xml
    zip.file('META-INF/container.xml',
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">\n' +
      '  <rootfiles>\n' +
      '    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>\n' +
      '  </rootfiles>\n' +
      '</container>'
    );

    // Style
    var css =
      '@charset "utf-8";\n' +
      'body {\n' +
      '  writing-mode: vertical-rl;\n' +
      '  -webkit-writing-mode: vertical-rl;\n' +
      '  -epub-writing-mode: vertical-rl;\n' +
      '  font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;\n' +
      '  line-height: 1.8;\n' +
      '  margin: 1.5em;\n' +
      '  text-align: justify;\n' +
      '}\n' +
      'p {\n' +
      '  text-indent: 1em;\n' +
      '  margin: 0;\n' +
      '}\n' +
      'h1, h2, h3, h4 { text-indent: 0; }\n' +
      'em.sesame {\n' +
      '  font-style: normal;\n' +
      '  -webkit-text-emphasis: filled sesame;\n' +
      '  text-emphasis: filled sesame;\n' +
      '}\n' +
      'rt { font-size: 0.55em; }\n' +
      'p.indent { margin-inline-start: 1em; text-indent: 0; }\n' +
      'img { max-width: 100%; max-height: 100%; }\n' +
      '.colophon { margin-top: 3em; font-size: 0.85em; }\n' +
      '.colophon p { text-indent: 0; margin: 0.2em 0; }\n';
    zip.file('OEBPS/style.css', css);

    // Cover
    var coverFileName, coverMime;
    if (customCover) {
      var ext = { 'image/png': 'png', 'image/jpeg': 'jpg', 'image/webp': 'webp', 'image/gif': 'gif' }[customCover.mime] || 'png';
      coverFileName = 'cover.' + ext;
      coverMime = customCover.mime;
      zip.file('OEBPS/images/' + coverFileName, customCover.data);
    } else {
      coverFileName = 'cover.svg';
      coverMime = 'image/svg+xml';
      zip.file('OEBPS/images/cover.svg', buildCoverSvg(title, author));
    }

    var coverXhtml =
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<!DOCTYPE html>\n' +
      '<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja">\n' +
      '<head><meta charset="UTF-8"/><title>Cover</title>\n' +
      '<style>body { margin: 0; padding: 0; text-align: center; } img { max-width: 100%; max-height: 100%; }</style>\n' +
      '</head>\n' +
      '<body epub:type="cover"><img src="../images/' + coverFileName + '" alt="Cover"/></body>\n' +
      '</html>';
    zip.file('OEBPS/text/cover.xhtml', coverXhtml);

    // Content XHTML
    var contentXhtml =
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<!DOCTYPE html>\n' +
      '<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja" lang="ja">\n' +
      '<head>\n' +
      '  <meta charset="UTF-8"/>\n' +
      '  <title>' + escapeXml(title) + '</title>\n' +
      '  <link rel="stylesheet" type="text/css" href="../style.css"/>\n' +
      '</head>\n' +
      '<body>\n' +
      '<h1>' + escapeXml(title) + '</h1>\n' +
      '<p>' + escapeXml(author) + '</p>\n' +
      bodyXhtml + '\n';

    // Colophon section
    if (colophon) {
      contentXhtml += '<div class="colophon" id="colophon">\n';
      var cLines = colophon.split('\n');
      for (var ci = 0; ci < cLines.length; ci++) {
        contentXhtml += '<p>' + escapeXml(cLines[ci]) + '</p>\n';
      }
      contentXhtml += '</div>\n';
    }

    contentXhtml += '</body>\n</html>';
    zip.file('OEBPS/text/content.xhtml', contentXhtml);

    // Images
    var imageManifest = '';
    for (var i = 0; i < images.length; i++) {
      var img = images[i];
      zip.file('OEBPS/images/' + img.name, img.data);
      imageManifest += '    <item id="img' + i + '" href="images/' + escapeXml(img.name) + '" media-type="' + img.mime + '"/>\n';
    }

    // Build TOC entries
    // Nested: h2 = top level, h3/h4 = children of preceding h2
    function buildNavOl(entries) {
      if (!entries.length) return '<ol><li><a href="text/content.xhtml">' + escapeXml(title) + '</a></li>' +
        (colophon ? '<li><a href="text/content.xhtml#colophon">底本情報</a></li>' : '') + '</ol>';
      var ol = '<ol>\n';
      ol += '<li><a href="text/content.xhtml">' + escapeXml(title) + '</a></li>\n';
      var i = 0;
      while (i < entries.length) {
        var e = entries[i];
        if (e.level === 2) {
          ol += '<li><a href="text/content.xhtml#' + e.id + '">' + escapeXml(e.text) + '</a>';
          // Collect children (h3, h4)
          var children = [];
          i++;
          while (i < entries.length && entries[i].level > 2) {
            children.push(entries[i]);
            i++;
          }
          if (children.length) {
            ol += '\n<ol>\n';
            for (var c = 0; c < children.length; c++) {
              ol += '<li><a href="text/content.xhtml#' + children[c].id + '">' + escapeXml(children[c].text) + '</a></li>\n';
            }
            ol += '</ol>\n';
          }
          ol += '</li>\n';
        } else {
          ol += '<li><a href="text/content.xhtml#' + e.id + '">' + escapeXml(e.text) + '</a></li>\n';
          i++;
        }
      }
      if (colophon) {
        ol += '<li><a href="text/content.xhtml#colophon">底本情報</a></li>\n';
      }
      ol += '</ol>';
      return ol;
    }

    // TOC (nav)
    var navXhtml =
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<!DOCTYPE html>\n' +
      '<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" xml:lang="ja">\n' +
      '<head><meta charset="UTF-8"/><title>Navigation</title>\n' +
      '<link rel="stylesheet" type="text/css" href="style.css"/>\n' +
      '</head>\n' +
      '<body>\n' +
      '<nav epub:type="toc" id="toc">\n' +
      '  <h1>目次</h1>\n' +
      '  ' + buildNavOl(toc) + '\n' +
      '</nav>\n' +
      '</body>\n' +
      '</html>';
    zip.file('OEBPS/toc.xhtml', navXhtml);

    // NCX (for EPUB 2 compat)
    var ncxPoints = '';
    ncxPoints += '  <navPoint id="np0" playOrder="0">\n' +
      '    <navLabel><text>' + escapeXml(title) + '</text></navLabel>\n' +
      '    <content src="text/content.xhtml"/>\n' +
      '  </navPoint>\n';
    for (var t = 0; t < toc.length; t++) {
      ncxPoints += '  <navPoint id="np' + (t + 1) + '" playOrder="' + (t + 1) + '">\n' +
        '    <navLabel><text>' + escapeXml(toc[t].text) + '</text></navLabel>\n' +
        '    <content src="text/content.xhtml#' + toc[t].id + '"/>\n' +
        '  </navPoint>\n';
    }

    var ncx =
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">\n' +
      '<head><meta name="dtb:uid" content="urn:uuid:' + uuid + '"/></head>\n' +
      '<docTitle><text>' + escapeXml(title) + '</text></docTitle>\n' +
      '<navMap>\n' + ncxPoints + '</navMap>\n' +
      '</ncx>';
    zip.file('OEBPS/toc.ncx', ncx);

    // Parse source info from colophon for OPF metadata
    var publisher = '';
    var pubDate = '';
    if (colophon) {
      var pubMatch = colophon.match(/底本[：:]「[^」]*」([^、\n]+)/);
      if (pubMatch) publisher = pubMatch[1].trim();
      var dateMatch = colophon.match(/(\d{4})[（(].*?[）)]\s*年\s*(\d{1,2})\s*月/);
      if (dateMatch) pubDate = dateMatch[1] + '-' + dateMatch[2].padStart(2, '0');
    }

    // OPF
    var opf =
      '<?xml version="1.0" encoding="UTF-8"?>\n' +
      '<package xmlns="http://www.idpf.org/2007/opf" version="3.0"\n' +
      '         unique-identifier="uid" xml:lang="ja" prefix="rendition: http://www.idpf.org/vocab/rendition/#">\n' +
      '  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">\n' +
      '    <dc:identifier id="uid">urn:uuid:' + uuid + '</dc:identifier>\n' +
      '    <dc:title>' + escapeXml(title) + '</dc:title>\n' +
      '    <dc:creator>' + escapeXml(author) + '</dc:creator>\n' +
      '    <dc:language>ja</dc:language>\n' +
      (publisher ? '    <dc:publisher>' + escapeXml(publisher) + '</dc:publisher>\n' : '') +
      (pubDate ? '    <dc:date>' + pubDate + '</dc:date>\n' : '') +
      '    <dc:source>https://www.aozora.gr.jp/</dc:source>\n' +
      '    <meta property="dcterms:modified">' + new Date().toISOString().replace(/\.\d+Z/, 'Z') + '</meta>\n' +
      '    <meta property="rendition:layout">reflowable</meta>\n' +
      '  </metadata>\n' +
      '  <manifest>\n' +
      '    <item id="cover" href="text/cover.xhtml" media-type="application/xhtml+xml"/>\n' +
      '    <item id="cover-image" href="images/' + coverFileName + '" media-type="' + coverMime + '" properties="cover-image"/>\n' +
      '    <item id="content" href="text/content.xhtml" media-type="application/xhtml+xml"/>\n' +
      '    <item id="style" href="style.css" media-type="text/css"/>\n' +
      '    <item id="nav" href="toc.xhtml" media-type="application/xhtml+xml" properties="nav"/>\n' +
      '    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>\n' +
      imageManifest +
      '  </manifest>\n' +
      '  <spine page-progression-direction="rtl" toc="ncx">\n' +
      '    <itemref idref="cover" linear="no"/>\n' +
      '    <itemref idref="content"/>\n' +
      '  </spine>\n' +
      '</package>';
    zip.file('OEBPS/content.opf', opf);

    return zip;
  }

  // --- File handling ---

  function processFile(file) {
    var name = file.name.toLowerCase();
    var reader = new FileReader();
    reader.onload = function(e) {
      var buf = e.target.result;
      if (name.endsWith('.zip')) {
        processZip(buf, file.name);
      } else if (name.endsWith('.html') || name.endsWith('.htm')) {
        var text = detectAndDecode(buf);
        var result = parseXhtml(text);
        setResult(result, file.name);
      } else {
        var text = detectAndDecode(buf);
        var result = parseTxt(text);
        setResult(result, file.name);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function processZip(buf, fileName) {
    JSZip.loadAsync(buf).then(function(zip) {
      var htmlFile = null;
      var txtFile = null;
      var imgFiles = [];

      zip.forEach(function(path, entry) {
        if (entry.dir) return;
        var lower = path.toLowerCase();
        if (lower.endsWith('.html') || lower.endsWith('.htm')) htmlFile = entry;
        else if (lower.endsWith('.txt')) txtFile = entry;
        else if (/\.(jpe?g|png|gif|svg|webp)$/i.test(lower)) imgFiles.push(entry);
      });

      var mainFile = htmlFile || txtFile;
      if (!mainFile) {
        showStatus('No .html or .txt file found in ZIP.', true);
        return;
      }

      var promises = [];
      promises.push(mainFile.async('arraybuffer'));
      imgFiles.forEach(function(img) {
        promises.push(img.async('uint8array').then(function(data) {
          var name = img.name.split('/').pop();
          var ext = name.split('.').pop().toLowerCase();
          var mime = { jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png',
                       gif: 'image/gif', svg: 'image/svg+xml', webp: 'image/webp' }[ext] || 'application/octet-stream';
          return { name: name, data: data, mime: mime };
        }));
      });

      Promise.all(promises).then(function(results) {
        var textBuf = results[0];
        var text = detectAndDecode(textBuf);
        var result;
        if (htmlFile) {
          result = parseXhtml(text);
        } else {
          result = parseTxt(text);
        }
        images = results.slice(1);
        setResult(result, fileName);
      });
    }).catch(function(err) {
      showStatus('Failed to read ZIP: ' + err.message, true);
    });
  }

  function setResult(result, fileName) {
    bookTitle = result.title;
    bookAuthor = result.author;
    bodyXhtml = result.body;
    bookToc = result.toc || [];
    bookColophon = result.colophon || '';

    titleInput.value = bookTitle;
    authorInput.value = bookAuthor;

    var info = fileName;
    if (images.length) info += ' + ' + images.length + ' image' + (images.length > 1 ? 's' : '');
    fileInfo.textContent = info;

    dropZone.classList.add('has-data');
    clearBtn.style.display = '';
    metaFields.classList.add('visible');
    actionRow.classList.add('visible');
    coverSection.classList.add('visible');
    statusEl.classList.remove('visible');
    customCover = null;
    resetCoverBtn.style.display = 'none';

    updateCoverPreview();

    // Show preview
    previewBody.innerHTML = bodyXhtml;
    preview.classList.add('visible');
  }

  function updateCoverPreview() {
    if (customCover) {
      var blob = new Blob([customCover.data], { type: customCover.mime });
      var img = document.createElement('img');
      img.src = URL.createObjectURL(blob);
      coverPreview.innerHTML = '';
      coverPreview.appendChild(img);
    } else {
      var t = titleInput.value.trim() || bookTitle || 'Untitled';
      var a = authorInput.value.trim() || bookAuthor || 'Unknown';
      coverPreview.innerHTML = buildCoverSvg(t, a);
    }
  }

  function clearAll() {
    bookTitle = '';
    bookAuthor = '';
    bodyXhtml = '';
    bookToc = [];
    bookColophon = '';
    images = [];
    titleInput.value = '';
    authorInput.value = '';
    fileInfo.textContent = '';
    customCover = null;
    dropZone.classList.remove('has-data');
    clearBtn.style.display = 'none';
    metaFields.classList.remove('visible');
    actionRow.classList.remove('visible');
    coverSection.classList.remove('visible');
    coverPreview.innerHTML = '';
    resetCoverBtn.style.display = 'none';
    statusEl.classList.remove('visible');
    preview.classList.remove('visible');
    previewBody.innerHTML = '';
    fileInput.value = '';
  }

  function showStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', !!isError);
    statusEl.classList.add('visible');
  }

  var toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }

  // --- Events ---

  dropZone.addEventListener('click', function(e) {
    if (dropZone.classList.contains('has-data')) return;
    if (e.target === clearBtn) return;
    fileInput.click();
  });

  fileInput.addEventListener('change', function() {
    var file = fileInput.files[0];
    if (file) processFile(file);
  });

  clearBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    clearAll();
  });

  ['dragenter', 'dragover'].forEach(function(name) {
    dropZone.addEventListener(name, function(e) {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(function(name) {
    dropZone.addEventListener(name, function(e) {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('drag-over');
    });
  });
  dropZone.addEventListener('drop', function(e) {
    var file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  // Cover: click to browse, drag-and-drop to replace
  function loadCoverFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      customCover = { data: new Uint8Array(e.target.result), mime: file.type };
      resetCoverBtn.style.display = '';
      updateCoverPreview();
    };
    reader.readAsArrayBuffer(file);
  }
  coverPreview.addEventListener('click', function() { coverFileInput.click(); });
  coverFileInput.addEventListener('change', function() {
    if (coverFileInput.files[0]) loadCoverFile(coverFileInput.files[0]);
  });
  ['dragenter', 'dragover'].forEach(function(name) {
    coverPreview.addEventListener(name, function(e) {
      e.preventDefault(); e.stopPropagation();
      coverPreview.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(function(name) {
    coverPreview.addEventListener(name, function(e) {
      e.preventDefault(); e.stopPropagation();
      coverPreview.classList.remove('drag-over');
    });
  });
  coverPreview.addEventListener('drop', function(e) {
    if (e.dataTransfer.files[0]) loadCoverFile(e.dataTransfer.files[0]);
  });
  resetCoverBtn.addEventListener('click', function() {
    customCover = null;
    resetCoverBtn.style.display = 'none';
    coverFileInput.value = '';
    updateCoverPreview();
  });

  // Refresh cover preview when title/author changes
  var coverRefreshTimer = null;
  function debouncedCoverRefresh() {
    clearTimeout(coverRefreshTimer);
    coverRefreshTimer = setTimeout(function() {
      if (!customCover && coverSection.classList.contains('visible')) updateCoverPreview();
    }, 300);
  }
  titleInput.addEventListener('input', debouncedCoverRefresh);
  authorInput.addEventListener('input', debouncedCoverRefresh);

  // Convert button
  convertBtn.addEventListener('click', function() {
    var title = titleInput.value.trim() || bookTitle || 'Untitled';
    var author = authorInput.value.trim() || bookAuthor || 'Unknown';

    if (!bodyXhtml) {
      showStatus('No content to convert.', true);
      return;
    }

    convertBtn.disabled = true;
    showStatus('Generating EPUB\u2026');

    try {
      var epub = buildEpub(title, author, bodyXhtml, images, bookToc, bookColophon);
      epub.generateAsync({ type: 'blob', mimeType: 'application/epub+zip' }).then(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (title + ' - ' + author).replace(/[\/\\:*?"<>|]/g, '_') + '.epub';
        a.click();
        URL.revokeObjectURL(a.href);
        convertBtn.disabled = false;
        statusEl.classList.remove('visible');
        showToast('EPUB downloaded');
      }).catch(function(err) {
        convertBtn.disabled = false;
        showStatus('EPUB generation failed: ' + err.message, true);
      });
    } catch (err) {
      convertBtn.disabled = false;
      showStatus('Error: ' + err.message, true);
    }
  });
</script>
</body>
</html>
