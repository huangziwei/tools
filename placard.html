<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Placard</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111418;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --panel: #f8fafc;
    --panel-active: #eff6ff;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --code-bg: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0d10;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --border: #262a30;
      --border-strong: #3a3f47;
      --panel: #14171c;
      --panel-active: #17253f;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --code-bg: #1a1f26;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main { width: 100%; max-width: 620px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin: 0 0 0.5rem; }
  h1 { font-size: 1.75rem; font-weight: 600; margin: 0; letter-spacing: -0.02em; }
  .github-link { color: var(--muted); display: flex; }
  .github-link:hover { color: var(--fg); text-decoration: none; }
  p.lead { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  label.field-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--fg);
  }

  input[type="number"] {
    padding: 0.45rem 0.6rem;
    font-size: 0.85rem;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    outline: none;
    font-family: inherit;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
  }

  .section { margin-top: 1.25rem; }

  .btn-primary {
    padding: 0.6rem 1.2rem;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  .btn-icon {
    padding: 0.35rem 0.5rem;
    font-size: 0.82rem;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    line-height: 1;
  }
  .btn-icon:hover { border-color: var(--accent); }

  .chip-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    padding: 0.35rem 0.7rem;
    font-size: 0.82rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--code-bg);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .chip:hover {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .chip.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }
  .color-swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border-strong);
    margin-right: 0.4rem;
  }

  .controls-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .palette-custom {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.5rem;
    font-size: 0.82rem;
    color: var(--muted);
    align-items: center;
  }
  .palette-custom label {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .palette-custom input[type="color"] {
    width: 28px;
    height: 24px;
    padding: 0;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: none;
    cursor: pointer;
  }
  .palette-custom input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  .palette-custom input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

  .custom-size {
    display: none;
    gap: 0.5rem;
    align-items: center;
    margin-top: 0.5rem;
  }
  .custom-size.visible { display: flex; }
  .custom-size input[type="number"] {
    width: 80px;
    text-align: center;
  }
  .custom-size .times {
    color: var(--muted);
    font-size: 0.85rem;
  }

  /* --- Workspace --- */
  .workspace-wrap {
    margin-top: 0;
    display: flex;
    justify-content: center;
  }
  .workspace {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: crosshair;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* --- Block toolbar (below workspace) --- */
  .block-toolbar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.75rem;
    min-height: 2rem;
    flex-wrap: wrap;
  }
  .block-toolbar .separator {
    width: 1px;
    height: 1.2rem;
    background: var(--border);
  }
  .block-controls {
    display: none;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .block-controls.visible { display: flex; }
  .block-controls input[type="number"] {
    width: 52px;
    text-align: center;
    padding: 0.3rem 0.2rem;
    font-size: 0.82rem;
  }
  .block-controls select {
    padding: 0.3rem 0.4rem;
    font-size: 0.82rem;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--panel);
    color: var(--fg);
    outline: none;
    font-family: inherit;
    max-width: 150px;
  }
  .block-controls input[type="range"] {
    width: 80px;
    accent-color: var(--accent);
    vertical-align: middle;
  }
  .inline-label {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .weight-label {
    font-size: 0.78rem;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    min-width: 2.2em;
    display: inline-block;
  }
  .btn-toggle {
    padding: 0.3rem 0.5rem;
    font-size: 0.82rem;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    min-width: 28px;
    text-align: center;
  }
  .btn-toggle:hover { border-color: var(--accent); }
  .btn-toggle.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* --- Text blocks --- */
  .text-block {
    position: absolute;
    cursor: move;
    border: 1px dashed var(--block-border);
    transition: border-color 0.1s;
  }
  .text-block:hover {
    border-color: var(--block-border-hover);
  }
  .text-block.selected {
    border: 2px solid var(--accent);
  }
  .text-block.editing {
    cursor: default;
  }
  .block-content {
    outline: none;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1em;
    line-height: 1.125;
    padding: 2px;
  }
  .block-delete {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--panel);
    color: var(--fg);
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .text-block.selected .block-delete { display: flex; }
  .block-resize {
    position: absolute;
    bottom: -5px;
    right: -5px;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 2px;
    cursor: nwse-resize;
    display: none;
    z-index: 10;
  }
  .text-block.selected .block-resize { display: block; }

  /* --- Drag guides --- */
  .drag-guides { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 20; }
  .workspace.dragging .drag-guides { display: block; }

  .guide-line {
    position: absolute;
    background: rgba(255,255,255,0.35);
  }
  .guide-h { height: 1px; left: 0; right: 0; }
  .guide-v { width: 1px; top: 0; bottom: 0; }

  .ruler-tick {
    position: absolute;
    font-size: 9px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    color: rgba(255,255,255,0.55);
    line-height: 1;
    white-space: nowrap;
  }

  .actions {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    font-weight: 500;
    background: var(--fg);
    color: var(--bg);
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.hide { opacity: 0; transform: translateX(-50%) translateY(0.5rem); }

  footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <div class="page-header">
    <h1>Placard</h1>
    <!-- SOURCE_LINK_START --><!-- SOURCE_LINK_END -->
  </div>
  <p class="lead">Make text placards in the style of nostalgic  <a href="https://evchk.fandom.com/zh/wiki/Iknowthissong.org">HK lyrics billboards</a>.</p>

  <div class="workspace-wrap">
    <div class="workspace" id="workspace">
      <div class="drag-guides" id="dragGuides"></div>
    </div>
  </div>

  <div class="block-toolbar">
    <button class="btn-secondary" id="addBlockBtn">+ Add text</button>
    <div class="block-controls" id="blockControls">
      <span class="separator"></span>
      <select id="fontSelect"></select>
      <label class="inline-label">Weight <input type="range" id="weightSlider" min="100" max="900" step="1" value="700"> <span class="weight-label" id="weightLabel">700</span></label>
      <label class="inline-label">Size <button class="btn-icon" id="fontDec">&minus;</button>
      <input type="number" id="fontSizeInput" min="8" max="400" value="56">
      <button class="btn-icon" id="fontInc">+</button></label>
      <button class="btn-toggle" id="italicToggle" title="Italic"><i>I</i></button>
      <button class="btn-toggle" id="verticalToggle" title="Vertical text">縦</button>
      <span class="separator"></span>
      <button class="btn-secondary" id="deleteBlockBtn">Delete</button>
    </div>
  </div>

  <div class="controls-row">
    <div>
      <label class="field-label">Palette</label>
      <div class="chip-row" id="paletteChips">
        <button class="chip active" data-bg="#002c42" data-fg="#fff200">
          <span class="color-swatch" style="background:#002c42"></span><span class="color-swatch" style="background:#fff200"></span>
        </button>
        <button class="chip" data-bg="#40285d" data-fg="#61ce8c">
          <span class="color-swatch" style="background:#40285d"></span><span class="color-swatch" style="background:#61ce8c"></span>
        </button>
        <button class="btn-icon" id="swapColors" title="Swap background and text colors">&#8644;</button>
      </div>
      <div class="palette-custom">
        <label>BG <input type="color" id="bgColorInput" value="#002c42"></label>
        <label>FG <input type="color" id="fgColorInput" value="#fff200"></label>
      </div>
    </div>
    <div>
      <label class="field-label">Size</label>
      <div class="chip-row" id="sizeChips">
        <button class="chip active" data-w="720" data-h="540">Standard</button>
        <button class="chip" data-w="custom" data-h="custom">Custom</button>
      </div>
      <div class="custom-size" id="customSize">
        <input type="number" id="customW" min="100" max="4096" value="720">
        <span class="times">&times;</span>
        <input type="number" id="customH" min="100" max="4096" value="540">
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="downloadBtn">Download PNG</button>
    <button class="btn-secondary" id="copyImgBtn">Copy image</button>
    <button class="btn-secondary" id="shareLinkBtn">Copy share link</button>
  </div>

  <footer>
    All data stays on your device.<br>
    <!-- TOOL_META_START --><!-- TOOL_META_END -->
  </footer>
</main>
<div class="toast" id="toast"></div>

<script>
  // --- System font detection ---
  var CJK_FONTS = [
    // macOS
    { name: 'PingFang TC', label: 'PingFang TC' },
    { name: 'PingFang SC', label: 'PingFang SC' },
    { name: 'PingFang HK', label: 'PingFang HK' },
    { name: 'Hiragino Sans', label: 'Hiragino Sans' },
    { name: 'Hiragino Mincho ProN', label: 'Hiragino Mincho' },
    { name: 'Songti TC', label: 'Songti TC' },
    { name: 'Songti SC', label: 'Songti SC' },
    { name: 'Kaiti TC', label: 'Kaiti TC' },
    { name: 'Kaiti SC', label: 'Kaiti SC' },
    // Windows
    { name: 'Microsoft JhengHei', label: 'Microsoft JhengHei' },
    { name: 'Microsoft YaHei', label: 'Microsoft YaHei' },
    { name: 'PMingLiU', label: 'PMingLiU' },
    { name: 'SimHei', label: 'SimHei' },
    { name: 'SimSun', label: 'SimSun' },
    { name: 'DFKai-SB', label: 'DFKai-SB (標楷體)' },
    { name: 'Yu Gothic', label: 'Yu Gothic' },
    { name: 'Yu Mincho', label: 'Yu Mincho' },
    { name: 'Meiryo', label: 'Meiryo' },
    // Linux / cross-platform
    { name: 'Noto Sans TC', label: 'Noto Sans TC' },
    { name: 'Noto Sans SC', label: 'Noto Sans SC' },
    { name: 'Noto Sans CJK TC', label: 'Noto Sans CJK TC' },
    { name: 'Noto Serif TC', label: 'Noto Serif TC' },
    { name: 'Noto Serif SC', label: 'Noto Serif SC' },
    { name: 'Source Han Sans TC', label: 'Source Han Sans TC' },
    { name: 'Source Han Serif TC', label: 'Source Han Serif TC' },
    { name: 'WenQuanYi Micro Hei', label: 'WenQuanYi Micro Hei' }
  ];

  function detectFont(name) {
    var c = document.createElement('canvas').getContext('2d');
    var test = '字體測試ABCabc';
    c.font = '72px monospace';
    var fallbackW = c.measureText(test).width;
    c.font = '72px "' + name + '", monospace';
    return c.measureText(test).width !== fallbackW;
  }

  var availableFonts = CJK_FONTS.filter(function(f) { return detectFont(f.name); });
  var PREFERRED = ['Hiragino Sans', 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC'];
  var DEFAULT_FONT = 'sans-serif';
  for (var i = 0; i < PREFERRED.length; i++) {
    if (availableFonts.some(function(f) { return f.name === PREFERRED[i]; })) {
      DEFAULT_FONT = PREFERRED[i]; break;
    }
  }
  if (DEFAULT_FONT === 'sans-serif' && availableFonts.length) DEFAULT_FONT = availableFonts[0].name;
  var PALETTES = [
    { bg: '#002c42', fg: '#fff200' },
    { bg: '#40285d', fg: '#61ce8c' }
  ];

  var workspace = document.getElementById('workspace');
  var paletteChips = document.getElementById('paletteChips');
  var swapColorsBtn = document.getElementById('swapColors');
  var bgColorInput = document.getElementById('bgColorInput');
  var fgColorInput = document.getElementById('fgColorInput');
  var sizeChips = document.getElementById('sizeChips');
  var customSize = document.getElementById('customSize');
  var customW = document.getElementById('customW');
  var customH = document.getElementById('customH');
  var addBlockBtn = document.getElementById('addBlockBtn');
  var blockControls = document.getElementById('blockControls');
  var fontSelect = document.getElementById('fontSelect');
  var weightSlider = document.getElementById('weightSlider');
  var weightLabel = document.getElementById('weightLabel');
  var fontSizeInput = document.getElementById('fontSizeInput');
  var fontDec = document.getElementById('fontDec');
  var fontInc = document.getElementById('fontInc');
  var italicToggle = document.getElementById('italicToggle');
  var verticalToggle = document.getElementById('verticalToggle');
  var deleteBlockBtn = document.getElementById('deleteBlockBtn');
  var downloadBtn = document.getElementById('downloadBtn');
  var copyImgBtn = document.getElementById('copyImgBtn');
  var shareLinkBtn = document.getElementById('shareLinkBtn');
  var toastTimer = null;

  // Populate font select with detected system fonts
  availableFonts.forEach(function(f) {
    var opt = document.createElement('option');
    opt.value = f.name;
    opt.textContent = f.label;
    fontSelect.appendChild(opt);
  });
  if (!availableFonts.length) {
    var opt = document.createElement('option');
    opt.value = 'sans-serif';
    opt.textContent = 'Sans-serif';
    fontSelect.appendChild(opt);
  }

  // --- State ---
  var state = { bg: '#002c42', fg: '#fff200', w: 720, h: 540, sizePreset: '720x540' };
  var nextId = 1;
  var blocks = []; // {id, x, y, w, fontSize, font, weight, italic, vertical, text} — x/y/w as fraction 0..1
  var selectedId = null;
  var editingId = null;
  var displayScale = 1;

  function showToast(msg) {
    var el = document.getElementById('toast');
    clearTimeout(toastTimer);
    el.textContent = msg;
    el.className = 'toast show';
    toastTimer = setTimeout(function() { el.className = 'toast hide'; }, 1200);
  }

  // --- Workspace sizing ---
  function updateWorkspaceSize() {
    var maxW = Math.min(616, window.innerWidth - 52);
    var maxH = 600;
    var aspect = state.w / state.h;
    var dw, dh;
    if (aspect >= 1) {
      dw = maxW; dh = dw / aspect;
      if (dh > maxH) { dh = maxH; dw = dh * aspect; }
    } else {
      dh = maxH; dw = dh * aspect;
      if (dw > maxW) { dw = maxW; dh = dw / aspect; }
    }
    dw = Math.round(dw);
    dh = Math.round(dh);
    workspace.style.width = dw + 'px';
    workspace.style.height = dh + 'px';
    displayScale = dw / state.w;
    applyTheme();
    syncAllBlocks();
  }

  function applyTheme() {
    workspace.style.background = state.bg;
    var fg = state.fg;
    var r = parseInt(fg.slice(1,3),16), g = parseInt(fg.slice(3,5),16), b = parseInt(fg.slice(5,7),16);
    workspace.style.setProperty('--block-border', 'rgba('+r+','+g+','+b+',0.3)');
    workspace.style.setProperty('--block-border-hover', 'rgba('+r+','+g+','+b+',0.5)');
    bgColorInput.value = state.bg;
    fgColorInput.value = state.fg;
  }

  // --- Block management ---
  function findBlock(id) {
    for (var i = 0; i < blocks.length; i++) {
      if (blocks[i].id === id) return blocks[i];
    }
    return null;
  }

  function getBlockEl(id) {
    return workspace.querySelector('.text-block[data-id="' + id + '"]');
  }

  function addBlock(opts) {
    opts = opts || {};
    var b = {
      id: nextId++,
      x: opts.x != null ? opts.x : 0.0375,
      y: opts.y != null ? opts.y : 0.05,
      w: opts.w != null ? opts.w : 0,
      fontSize: opts.fontSize || 56,
      font: opts.font || DEFAULT_FONT,
      weight: opts.weight || (opts.bold === false ? 400 : 700),
      italic: opts.italic || false,
      vertical: opts.vertical || false,
      text: opts.text || ''
    };
    blocks.push(b);
    var el = createBlockEl(b);
    workspace.appendChild(el);
    syncBlock(b);
    if (opts.w == null) autoFitBlock(b);
    selectBlock(b.id);
    return b;
  }

  function createBlockEl(b) {
    var el = document.createElement('div');
    el.className = 'text-block';
    el.dataset.id = b.id;

    var content = document.createElement('div');
    content.className = 'block-content';
    if (b.text) content.textContent = b.text;
    el.appendChild(content);

    var del = document.createElement('button');
    del.className = 'block-delete';
    del.textContent = '\u00d7';
    del.title = 'Delete';
    el.appendChild(del);

    var resize = document.createElement('div');
    resize.className = 'block-resize';
    el.appendChild(resize);

    return el;
  }

  function syncBlock(b) {
    var el = getBlockEl(b.id);
    if (!el) return;
    var content = el.querySelector('.block-content');
    el.style.left = (b.x * 100) + '%';
    el.style.top = (b.y * 100) + '%';
    el.style.width = (b.w * 100) + '%';
    content.style.fontSize = (b.fontSize * displayScale) + 'px';
    content.style.fontFamily = '"' + b.font + '", sans-serif';
    content.style.fontWeight = b.weight;
    content.style.fontStyle = b.italic ? 'italic' : 'normal';
    content.style.writingMode = b.vertical ? 'vertical-rl' : 'horizontal-tb';
    content.style.color = state.fg;
    if (typeof scheduleSave === 'function') scheduleSave();
  }

  function syncAllBlocks() {
    for (var i = 0; i < blocks.length; i++) syncBlock(blocks[i]);
  }

  function autoFitBlock(b) {
    var el = getBlockEl(b.id);
    if (!el) return;
    var content = el.querySelector('.block-content');
    var wsRect = workspace.getBoundingClientRect();
    // Let content flow at max width so we can measure its natural size
    el.style.width = wsRect.width + 'px';
    content.style.width = 'max-content';
    var cRect = content.getBoundingClientRect();
    content.style.width = '';
    var newW = (cRect.width + 4) / wsRect.width;
    // Minimum: roughly one character
    var minW = (b.fontSize * displayScale + 4) / wsRect.width;
    newW = Math.max(minW, Math.min(1, newW));
    b.w = newW;
    syncBlock(b);
  }

  function selectBlock(id) {
    if (editingId && editingId !== id) stopEditing();
    selectedId = id;
    var all = workspace.querySelectorAll('.text-block');
    for (var i = 0; i < all.length; i++) {
      var bid = parseInt(all[i].dataset.id);
      all[i].classList.toggle('selected', bid === id);
      all[i].querySelector('.block-content').contentEditable = 'false';
    }
    var b = findBlock(id);
    if (b) {
      fontSelect.value = b.font;
      weightSlider.value = b.weight;
      weightLabel.textContent = b.weight;
      fontSizeInput.value = b.fontSize;
      italicToggle.classList.toggle('active', b.italic);
      verticalToggle.classList.toggle('active', b.vertical);
      blockControls.classList.add('visible');
    }
  }

  function deselectAll() {
    if (editingId) stopEditing();
    selectedId = null;
    var all = workspace.querySelectorAll('.text-block');
    for (var i = 0; i < all.length; i++) {
      all[i].classList.remove('selected', 'editing');
      all[i].querySelector('.block-content').contentEditable = 'false';
    }
    blockControls.classList.remove('visible');
  }

  function startEditing(id) {
    editingId = id;
    var el = getBlockEl(id);
    if (!el) return;
    el.classList.add('editing');
    var content = el.querySelector('.block-content');
    content.contentEditable = 'true';
    content.focus();
    // Place cursor at end
    var sel = window.getSelection();
    sel.selectAllChildren(content);
    sel.collapseToEnd();
  }

  function stopEditing() {
    if (!editingId) return;
    var el = getBlockEl(editingId);
    if (el) {
      el.classList.remove('editing');
      var content = el.querySelector('.block-content');
      content.contentEditable = 'false';
      // Save text back to block data
      var b = findBlock(editingId);
      if (b) b.text = content.innerText;
    }
    editingId = null;
  }

  function deleteBlock(id) {
    var el = getBlockEl(id);
    if (el) el.remove();
    blocks = blocks.filter(function(b) { return b.id !== id; });
    if (selectedId === id) deselectAll();
    if (editingId === id) editingId = null;
    if (typeof scheduleSave === 'function') scheduleSave();
  }

  // --- Drag guides ---
  var dragGuides = document.getElementById('dragGuides');

  function showGuides(b) {
    var el = getBlockEl(b.id);
    if (!el) return;
    workspace.classList.add('dragging');
    dragGuides.innerHTML = '';

    var content = el.querySelector('.block-content');
    var wsRect = workspace.getBoundingClientRect();
    var cRect = content.getBoundingClientRect();

    // Block edges in % relative to workspace
    var left = b.x;
    var top = b.y;
    var right = b.x + (cRect.width / wsRect.width);
    var bottom = b.y + (cRect.height / wsRect.height);
    var cx = (left + right) / 2;
    var cy = (top + bottom) / 2;

    // Edge guide lines — extending from block edges to workspace edges
    addGuide('guide-h', top);   // top edge
    addGuide('guide-h', bottom);// bottom edge
    addGuide('guide-v', left);  // left edge
    addGuide('guide-v', right); // right edge

    // Center cross-hairs
    addGuide('guide-h', cy);
    addGuide('guide-v', cx);

    // Workspace center guides (50% lines) — slightly brighter
    var chH = addGuide('guide-h', 0.5);
    var chV = addGuide('guide-v', 0.5);
    chH.style.background = 'rgba(255,255,255,0.15)';
    chV.style.background = 'rgba(255,255,255,0.15)';
    chH.style.borderTop = '1px dashed rgba(255,255,255,0.25)';
    chH.style.background = 'none';
    chV.style.borderLeft = '1px dashed rgba(255,255,255,0.25)';
    chV.style.background = 'none';

    // Ruler ticks at four edges (in canvas pixels)
    var pxL = Math.round(left * state.w);
    var pxR = Math.round(right * state.w);
    var pxT = Math.round(top * state.h);
    var pxB = Math.round(bottom * state.h);

    addTick(pxL + 'px', 'left:' + (left*100) + '%; bottom: 2px;');
    addTick(pxR + 'px', 'left:' + (right*100) + '%; bottom: 2px;');
    addTick(pxT + 'px', 'top:' + (top*100) + '%; left: 2px;');
    addTick(pxB + 'px', 'top:' + (bottom*100) + '%; left: 2px;');
  }

  function addGuide(cls, frac) {
    var el = document.createElement('div');
    el.className = 'guide-line ' + cls;
    if (cls === 'guide-h') el.style.top = (frac * 100) + '%';
    else el.style.left = (frac * 100) + '%';
    dragGuides.appendChild(el);
    return el;
  }

  function addTick(label, style) {
    var el = document.createElement('div');
    el.className = 'ruler-tick';
    el.textContent = label;
    el.style.cssText = style;
    dragGuides.appendChild(el);
  }

  function hideGuides() {
    workspace.classList.remove('dragging');
    dragGuides.innerHTML = '';
  }

  // --- Pointer interactions on workspace ---
  var dragState = null; // {type:'move'|'resize', blockId, startX, startY, origX, origY, origW, moved}

  workspace.addEventListener('pointerdown', function(e) {
    var blockEl = e.target.closest('.text-block');

    if (!blockEl) {
      // Clicked empty workspace area
      deselectAll();
      return;
    }

    var id = parseInt(blockEl.dataset.id);

    // Delete button
    if (e.target.closest('.block-delete')) {
      e.preventDefault();
      deleteBlock(id);
      return;
    }

    // Resize handle
    if (e.target.closest('.block-resize')) {
      e.preventDefault();
      var b = findBlock(id);
      dragState = { type: 'resize', blockId: id, startX: e.clientX, startY: e.clientY, origW: b.w, moved: false };
      workspace.setPointerCapture(e.pointerId);
      return;
    }

    // If already editing this block and clicking content, let browser handle text cursor
    if (editingId === id && e.target.closest('.block-content')) {
      return;
    }

    e.preventDefault();

    // If block not yet selected → select it
    if (selectedId !== id) {
      selectBlock(id);
    } else if (editingId !== id) {
      // Block is selected, not editing → second click enters edit mode
      // But only if pointer doesn't move (handled in pointerup)
    }

    var b = findBlock(id);
    dragState = { type: 'move', blockId: id, startX: e.clientX, startY: e.clientY, origX: b.x, origY: b.y, moved: false };
    workspace.setPointerCapture(e.pointerId);
  });

  workspace.addEventListener('pointermove', function(e) {
    if (!dragState) return;
    var dx = e.clientX - dragState.startX;
    var dy = e.clientY - dragState.startY;

    if (!dragState.moved && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    dragState.moved = true;

    var b = findBlock(dragState.blockId);
    if (!b) return;

    var rect = workspace.getBoundingClientRect();

    if (dragState.type === 'move') {
      b.x = dragState.origX + dx / rect.width;
      b.y = dragState.origY + dy / rect.height;
      // Clamp so block stays partially visible
      b.x = Math.max(-0.5, Math.min(0.95, b.x));
      b.y = Math.max(-0.5, Math.min(0.95, b.y));
      syncBlock(b);
      showGuides(b);
    } else if (dragState.type === 'resize') {
      b.w = dragState.origW + dx / rect.width;
      b.w = Math.max(0.05, Math.min(1, b.w));
      syncBlock(b);
      showGuides(b);
    }
  });

  workspace.addEventListener('pointerup', function(e) {
    if (!dragState) return;
    hideGuides();
    var id = dragState.blockId;
    var wasMoved = dragState.moved;
    var wasMove = dragState.type === 'move';
    dragState = null;

    // Click without drag on already-selected block → enter edit mode
    if (!wasMoved && wasMove && selectedId === id && editingId !== id) {
      startEditing(id);
    }
  });

  // Force plain-text paste
  workspace.addEventListener('paste', function(e) {
    if (!editingId) return;
    e.preventDefault();
    var text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // Save text on every input inside a contenteditable
  workspace.addEventListener('input', function(e) {
    if (!editingId) return;
    var b = findBlock(editingId);
    if (b) {
      var el = getBlockEl(editingId);
      if (el) b.text = el.querySelector('.block-content').innerText;
      autoFitBlock(b);
    }
    scheduleSave();
  });

  // Double-click empty workspace area → add block at that position
  workspace.addEventListener('dblclick', function(e) {
    if (e.target.closest('.text-block')) return;
    var rect = workspace.getBoundingClientRect();
    var x = (e.clientX - rect.left) / rect.width;
    var y = (e.clientY - rect.top) / rect.height;
    addBlock({ x: x, y: y });
  });

  // Click outside workspace to deselect
  document.addEventListener('pointerdown', function(e) {
    if (!e.target.closest('.workspace') && !e.target.closest('.block-toolbar') && !e.target.closest('.controls-row') && !e.target.closest('.actions')) {
      deselectAll();
    }
  });

  // --- Block toolbar ---
  addBlockBtn.addEventListener('click', function() {
    var offsetY = 0.05 + blocks.length * 0.06;
    if (offsetY > 0.7) offsetY = 0.7;
    addBlock({ y: offsetY });
  });

  fontSizeInput.addEventListener('input', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.fontSize = Math.max(8, Math.min(400, parseInt(fontSizeInput.value) || 56));
    syncBlock(b);
  });

  fontDec.addEventListener('click', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.fontSize = Math.max(8, b.fontSize - 2);
    fontSizeInput.value = b.fontSize;
    syncBlock(b);
  });

  fontInc.addEventListener('click', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.fontSize = Math.min(400, b.fontSize + 2);
    fontSizeInput.value = b.fontSize;
    syncBlock(b);
  });

  fontSelect.addEventListener('change', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.font = fontSelect.value;
    syncBlock(b);
  });

  weightSlider.addEventListener('input', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.weight = parseInt(weightSlider.value);
    weightLabel.textContent = b.weight;
    syncBlock(b);
  });

  italicToggle.addEventListener('click', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.italic = !b.italic;
    italicToggle.classList.toggle('active', b.italic);
    syncBlock(b);
  });

  verticalToggle.addEventListener('click', function() {
    var b = findBlock(selectedId);
    if (!b) return;
    b.vertical = !b.vertical;
    verticalToggle.classList.toggle('active', b.vertical);
    syncBlock(b);
    autoFitBlock(b);
  });

  deleteBlockBtn.addEventListener('click', function() {
    if (selectedId != null) deleteBlock(selectedId);
  });

  // --- Palette handling ---
  function updatePaletteChipUI() {
    var chips = paletteChips.querySelectorAll('.chip');
    for (var i = 0; i < chips.length; i++) {
      var c = chips[i];
      c.classList.toggle('active', c.dataset.bg === state.bg && c.dataset.fg === state.fg);
    }
  }

  function setPalette(bg, fg) {
    state.bg = bg;
    state.fg = fg;
    updatePaletteChipUI();
    applyTheme();
    syncAllBlocks();
  }

  paletteChips.addEventListener('click', function(e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    setPalette(chip.dataset.bg, chip.dataset.fg);
  });

  swapColorsBtn.addEventListener('click', function() {
    setPalette(state.fg, state.bg);
  });

  bgColorInput.addEventListener('input', function() {
    setPalette(bgColorInput.value, state.fg);
  });

  fgColorInput.addEventListener('input', function() {
    setPalette(state.bg, fgColorInput.value);
  });

  // --- Size handling ---
  function setCanvasSize(w, h, preset) {
    state.w = w;
    state.h = h;
    state.sizePreset = preset;
    updateWorkspaceSize();
  }

  function updateSizeChipUI(preset) {
    var chips = sizeChips.querySelectorAll('.chip');
    for (var i = 0; i < chips.length; i++) {
      var c = chips[i];
      var cw = c.dataset.w;
      var ch = c.dataset.h;
      var id = (cw === 'custom') ? 'custom' : cw + 'x' + ch;
      c.classList.toggle('active', id === preset);
    }
    customSize.classList.toggle('visible', preset === 'custom');
  }

  sizeChips.addEventListener('click', function(e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    var cw = chip.dataset.w;
    var ch = chip.dataset.h;
    if (cw === 'custom') {
      updateSizeChipUI('custom');
      setCanvasSize(parseInt(customW.value) || 720, parseInt(customH.value) || 540, 'custom');
    } else {
      var w = parseInt(cw), h = parseInt(ch);
      updateSizeChipUI(w + 'x' + h);
      setCanvasSize(w, h, w + 'x' + h);
    }
  });

  customW.addEventListener('input', function() {
    if (state.sizePreset === 'custom') setCanvasSize(parseInt(customW.value) || 100, state.h, 'custom');
  });
  customH.addEventListener('input', function() {
    if (state.sizePreset === 'custom') setCanvasSize(state.w, parseInt(customH.value) || 100, 'custom');
  });

  // --- Export via SVG foreignObject (uses the browser's own CSS renderer) ---
  function renderToCanvas() {
    var wrapper = document.createElement('div');
    wrapper.setAttribute('xmlns', 'http://www.w3.org/1999/xhtml');
    wrapper.style.cssText = 'width:'+state.w+'px;height:'+state.h+'px;background:'+state.bg+';position:relative;overflow:hidden;';

    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (!b.text) continue;
      var div = document.createElement('div');
      div.style.position = 'absolute';
      div.style.left = (b.x * state.w) + 'px';
      div.style.top = (b.y * state.h) + 'px';
      div.style.width = (b.w * state.w) + 'px';
      div.style.fontSize = b.fontSize + 'px';
      div.style.fontFamily = '"' + b.font + '", sans-serif';
      div.style.fontWeight = b.weight;
      div.style.fontStyle = b.italic ? 'italic' : 'normal';
      div.style.writingMode = b.vertical ? 'vertical-rl' : 'horizontal-tb';
      div.style.color = state.fg;
      div.style.whiteSpace = 'pre-wrap';
      div.style.wordBreak = 'break-word';
      div.style.lineHeight = '1.125';
      div.style.padding = '2px';
      div.textContent = b.text;
      wrapper.appendChild(div);
    }

    var serialized = new XMLSerializer().serializeToString(wrapper);
    var svgStr = '<svg xmlns="http://www.w3.org/2000/svg" width="'+state.w+'" height="'+state.h+'">' +
      '<foreignObject width="100%" height="100%">' + serialized + '</foreignObject></svg>';

    return new Promise(function(resolve, reject) {
      var img = new Image();
      img.onload = function() {
        var c = document.createElement('canvas');
        c.width = state.w;
        c.height = state.h;
        c.getContext('2d').drawImage(img, 0, 0);
        resolve(c);
      };
      img.onerror = function() { reject(new Error('Render failed')); };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
    });
  }

  // --- Download ---
  downloadBtn.addEventListener('click', function() {
    renderToCanvas().then(function(c) {
      var a = document.createElement('a');
      a.download = 'placard.png';
      a.href = c.toDataURL('image/png');
      a.click();
    }).catch(function() { showToast('Export failed'); });
  });

  // --- Copy image ---
  copyImgBtn.addEventListener('click', function() {
    renderToCanvas().then(function(c) {
      c.toBlob(function(blob) {
        navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(function() {
          showToast('Copied image');
        }).catch(function() { showToast('Copy failed'); });
      }, 'image/png');
    }).catch(function() { showToast('Export failed'); });
  });

  // --- Share link ---
  function encodeState() {
    var data = {
      bg: state.bg,
      fg: state.fg,
      sw: state.w,
      sh: state.h,
      b: blocks.map(function(b) { return { x: b.x, y: b.y, w: b.w, fs: b.fontSize, f: b.font, wt: b.weight, it: b.italic, v: b.vertical, t: b.text }; })
    };
    return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  }

  function decodeState(hash) {
    try {
      return JSON.parse(decodeURIComponent(escape(atob(hash))));
    } catch(e) { return null; }
  }

  shareLinkBtn.addEventListener('click', function() {
    // Sync all text from DOM before encoding
    blocks.forEach(function(b) {
      var el = getBlockEl(b.id);
      if (el) b.text = el.querySelector('.block-content').innerText;
    });
    var url = location.origin + location.pathname + '#' + encodeState();
    navigator.clipboard.writeText(url).then(function() {
      showToast('Link copied');
    }).catch(function() { showToast('Copy failed'); });
  });

  // --- Load from hash ---
  function loadFromHash() {
    var hash = location.hash.slice(1);
    if (!hash) return false;
    var s = decodeState(hash);
    if (!s) return false;
    if (s.bg) state.bg = s.bg;
    if (s.fg) state.fg = s.fg;
    if (s.sw && s.sh) {
      state.w = s.sw;
      state.h = s.sh;
      var preset = s.sw + 'x' + s.sh;
      var found = false;
      var chips = sizeChips.querySelectorAll('.chip');
      for (var i = 0; i < chips.length; i++) {
        if (chips[i].dataset.w + 'x' + chips[i].dataset.h === preset) { found = true; break; }
      }
      state.sizePreset = found ? preset : 'custom';
      if (!found) { customW.value = s.sw; customH.value = s.sh; }
      updateSizeChipUI(state.sizePreset);
    }
    updatePaletteChipUI();
    if (s.b && s.b.length) {
      for (var i = 0; i < s.b.length; i++) {
        var sb = s.b[i];
        addBlock({ x: sb.x, y: sb.y, w: sb.w, fontSize: sb.fs, font: sb.f || DEFAULT_FONT, weight: sb.wt || (sb.bo === false ? 400 : 700), italic: sb.it || false, vertical: sb.v || false, text: sb.t });
      }
    }
    deselectAll();
    updateWorkspaceSize();
    return true;
  }

  // --- Local storage persistence ---
  var STORAGE_KEY = 'placard_state';

  function saveToStorage() {
    // Sync text from DOM before saving
    blocks.forEach(function(b) {
      var el = getBlockEl(b.id);
      if (el) b.text = el.querySelector('.block-content').innerText;
    });
    try {
      localStorage.setItem(STORAGE_KEY, encodeState());
    } catch(e) {}
  }

  function loadFromStorage() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return false;
      var s = decodeState(saved);
      if (!s) return false;
      if (s.bg) state.bg = s.bg;
      if (s.fg) state.fg = s.fg;
      if (s.sw && s.sh) {
        state.w = s.sw;
        state.h = s.sh;
        var preset = s.sw + 'x' + s.sh;
        var found = false;
        var chips = sizeChips.querySelectorAll('.chip');
        for (var i = 0; i < chips.length; i++) {
          if (chips[i].dataset.w + 'x' + chips[i].dataset.h === preset) { found = true; break; }
        }
        state.sizePreset = found ? preset : 'custom';
        if (!found) { customW.value = s.sw; customH.value = s.sh; }
        updateSizeChipUI(state.sizePreset);
      }
      updatePaletteChipUI();
      if (s.b && s.b.length) {
        for (var i = 0; i < s.b.length; i++) {
          var sb = s.b[i];
          addBlock({ x: sb.x, y: sb.y, w: sb.w, fontSize: sb.fs, font: sb.f || DEFAULT_FONT, weight: sb.wt || (sb.bo === false ? 400 : 700), italic: sb.it || false, vertical: sb.v || false, text: sb.t });
        }
      }
      deselectAll();
      updateWorkspaceSize();
      return true;
    } catch(e) { return false; }
  }

  // Debounced auto-save
  var saveTimer = null;
  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveToStorage, 300);
  }

  // --- Init ---
  updateWorkspaceSize();
  if (!loadFromHash()) {
    if (!loadFromStorage()) {
      // Start with one empty block
      addBlock();
      deselectAll();
    }
  }

  window.addEventListener('resize', function() { updateWorkspaceSize(); });
</script>
</body>
</html>
