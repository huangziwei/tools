<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Code Generator</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111418;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --panel: #f8fafc;
    --panel-active: #eff6ff;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --code-bg: #f1f5f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0d10;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --border: #262a30;
      --border-strong: #3a3f47;
      --panel: #14171c;
      --panel-active: #17253f;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --code-bg: #1a1f26;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main { width: 100%; max-width: 620px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin: 0 0 0.5rem; }
  h1 { font-size: 1.75rem; font-weight: 600; margin: 0; letter-spacing: -0.02em; }
  .github-link { color: var(--muted); display: flex; }
  .github-link:hover { color: var(--fg); text-decoration: none; }
  p.lead { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  label.field-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: var(--fg);
  }

  input[type="text"] {
    width: 100%;
    padding: 0.65rem 0.85rem;
    font-size: 0.95rem;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.7; }

  .section { margin-top: 1.5rem; }

  .preview-area {
    margin-top: 1.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 280px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--panel);
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .preview-area canvas {
    max-width: 100%;
    height: auto;
    display: block;
  }
  .preview-placeholder {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .preview-area.drag-over {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .preview-hint {
    position: absolute;
    bottom: 0.5rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    pointer-events: none;
    opacity: 0.7;
  }

  input[type="file"] {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
    user-select: none;
  }
  .toggle-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
  }

  .frame-options { margin-top: 0.75rem; }

  .frame-presets {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .frame-btn {
    padding: 0.4rem 0.9rem;
    font-size: 0.82rem;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .frame-btn:hover {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .frame-btn.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .btn-row { margin-top: 1.5rem; display: flex; gap: 0.75rem; }

  .btn-primary {
    padding: 0.6rem 1.4rem;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-secondary {
    padding: 0.4rem 0.9rem;
    font-size: 0.82rem;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  .color-section { margin-top: 1.5rem; }
  .color-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .color-row-label {
    font-size: 0.82rem;
    font-weight: 500;
    width: 3.2rem;
    flex-shrink: 0;
  }
  input[type="color"] {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
    background: var(--panel);
    flex-shrink: 0;
  }
  .swatches {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
  }
  .swatch {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    padding: 0;
  }
  .swatch:hover {
    border-color: var(--fg);
    transform: scale(1.12);
  }

  footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <div class="page-header">
    <h1>QR Code Generator</h1>
    <!-- SOURCE_LINK_START --><a href="https://github.com/huangziwei/tools/blob/main/qr-code.html" target="_blank" rel="noopener" class="github-link" title="View source on GitHub"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a><!-- SOURCE_LINK_END -->
  </div>
  <p class="lead">Generate QR codes with optional logo and decorative frames.</p>

  <div>
    <label class="field-label" for="urlInput">URL or text</label>
    <input type="text" id="urlInput" placeholder="https://example.com">
  </div>

  <div class="preview-area" id="previewArea">
    <span class="preview-placeholder" id="placeholder">Enter a URL above to generate a QR code</span>
    <canvas id="previewCanvas" style="display:none"></canvas>
    <span class="preview-hint" id="logoHint" style="display:none">Drop a logo onto the QR code</span>
    <input type="file" id="logoInput" accept="image/*">
  </div>
  <div class="row" style="margin-top:0.5rem">
    <button class="btn-secondary" id="removeLogo" style="display:none">Remove logo</button>
  </div>

  <div class="section">
    <label class="toggle-label">
      <input type="checkbox" id="frameToggle">
      Add background frame
    </label>
    <div class="frame-options" id="frameOptions" style="display:none">
      <div class="frame-presets" id="framePresets">
        <button class="frame-btn active" data-frame="card">Card</button>
        <button class="frame-btn" data-frame="viewfinder">Viewfinder</button>
        <button class="frame-btn" data-frame="banner">Banner</button>
      </div>
      <label class="field-label" for="frameLabelInput">Label text</label>
      <input type="text" id="frameLabelInput" value="SCAN ME" placeholder="SCAN ME">
    </div>
  </div>

  <div class="color-section">
    <label class="field-label">Colors</label>
    <div class="color-row">
      <span class="color-row-label">Dots</span>
      <input type="color" id="dotColorInput" value="#000000">
      <div class="swatches" id="dotSwatches"></div>
    </div>
    <div class="color-row">
      <span class="color-row-label">Eyes</span>
      <input type="color" id="eyeColorInput" value="#000000">
      <div class="swatches" id="eyeSwatches"></div>
    </div>
    <div class="color-row" id="labelColorRow" style="display:none">
      <span class="color-row-label">Label</span>
      <input type="color" id="labelColorInput" value="#000000">
      <div class="swatches" id="labelSwatches"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="downloadBtn" disabled>Download PNG</button>
  </div>

  <footer>
    All data stays on your device.<br>
    <!-- TOOL_META_START --><time datetime="2026-04-12T23:22:30+02:00">Updated at 2026/04/12 23:22</time><!-- TOOL_META_END -->
  </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
  const urlInput = document.getElementById('urlInput');
  const previewArea = document.getElementById('previewArea');
  const previewCanvas = document.getElementById('previewCanvas');
  const placeholder = document.getElementById('placeholder');
  const logoHint = document.getElementById('logoHint');
  const logoInput = document.getElementById('logoInput');
  const removeLogo = document.getElementById('removeLogo');
  const dotColorInput = document.getElementById('dotColorInput');
  const eyeColorInput = document.getElementById('eyeColorInput');
  const labelColorInput = document.getElementById('labelColorInput');
  const dotSwatches = document.getElementById('dotSwatches');
  const eyeSwatches = document.getElementById('eyeSwatches');
  const labelSwatches = document.getElementById('labelSwatches');
  const labelColorRow = document.getElementById('labelColorRow');
  const frameToggle = document.getElementById('frameToggle');
  const frameOptions = document.getElementById('frameOptions');
  const framePresets = document.getElementById('framePresets');
  const frameLabelInput = document.getElementById('frameLabelInput');
  const downloadBtn = document.getElementById('downloadBtn');

  let logoImg = null;
  let dotColor = '#000000';
  let eyeColor = '#000000';
  let labelColor = '#000000';
  let palette = [];
  let currentFrame = 'card';
  let debounceTimer = null;

  // --- Color extraction ---

  function extractPalette(img, maxColors) {
    maxColors = maxColors || 4;
    // Render large to minimize antialiasing artifacts
    const size = 256;
    const c = document.createElement('canvas');
    c.width = size;
    c.height = size;
    const ctx = c.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0, size, size);
    const data = ctx.getImageData(0, 0, size, size).data;

    // Coarse 9-bit quantization (3 bits per channel) to merge antialiased shades
    const buckets = new Map();
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
      // Skip transparent and near-white
      if (a < 200) continue;
      if (r > 240 && g > 240 && b > 240) continue;
      const key = ((r >> 5) << 6) | ((g >> 5) << 3) | (b >> 5);
      const entry = buckets.get(key);
      if (entry) {
        entry.r += r; entry.g += g; entry.b += b; entry.n++;
      } else {
        buckets.set(key, { r, g, b, n: 1 });
      }
    }

    const totalPixels = size * size;
    const sorted = [...buckets.values()]
      .filter(e => e.n >= totalPixels * 0.005)
      .sort((a, b) => b.n - a.n);

    const result = [];
    for (const entry of sorted) {
      if (result.length >= maxColors) break;
      const r = Math.round(entry.r / entry.n);
      const g = Math.round(entry.g / entry.n);
      const b = Math.round(entry.b / entry.n);
      // Merge with existing if too close
      let distinct = true;
      for (const ex of result) {
        const dr = r - ex.r, dg = g - ex.g, db = b - ex.b;
        if (Math.sqrt(dr * dr + dg * dg + db * db) < 100) { distinct = false; break; }
      }
      if (!distinct) continue;
      result.push({ r, g, b });
    }

    return result.map(c =>
      '#' + [c.r, c.g, c.b].map(v => v.toString(16).padStart(2, '0')).join('')
    );
  }

  function renderPalette() {
    [dotSwatches, eyeSwatches, labelSwatches].forEach(container => {
      container.innerHTML = '';
      palette.forEach(hex => {
        const btn = document.createElement('button');
        btn.className = 'swatch';
        btn.style.background = hex;
        btn.dataset.color = hex;
        btn.title = hex;
        container.appendChild(btn);
      });
    });
  }

  // --- Utility ---

  function roundedRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function isFinderPattern(row, col, count) {
    if (row < 7 && col < 7) return true;
    if (row < 7 && col >= count - 7) return true;
    if (row >= count - 7 && col < 7) return true;
    return false;
  }

  function drawFinderPattern(ctx, x, y, size, color) {
    const u = size / 7;
    const r1 = u * 0.8;
    const r2 = u * 0.6;

    ctx.fillStyle = color;
    roundedRect(ctx, x, y, size, size, r1);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    roundedRect(ctx, x + u, y + u, u * 5, u * 5, r2);
    ctx.fill();

    ctx.fillStyle = color;
    roundedRect(ctx, x + u * 2, y + u * 2, u * 3, u * 3, r2);
    ctx.fill();
  }

  // --- Rendering ---

  function render() {
    const data = urlInput.value.trim();
    if (!data) {
      previewCanvas.style.display = 'none';
      logoHint.style.display = 'none';
      placeholder.style.display = '';
      downloadBtn.disabled = true;
      return;
    }

    let qr;
    try {
      qr = qrcode(0, 'H');
      qr.addData(data);
      qr.make();
    } catch (e) {
      previewCanvas.style.display = 'none';
      logoHint.style.display = 'none';
      placeholder.textContent = 'Text too long for QR encoding';
      placeholder.style.display = '';
      downloadBtn.disabled = true;
      return;
    }

    placeholder.style.display = 'none';
    previewCanvas.style.display = '';
    logoHint.style.display = logoImg ? 'none' : '';
    downloadBtn.disabled = false;

    const moduleCount = qr.getModuleCount();
    const quietZone = 4;
    const baseSize = 1024;
    const moduleSize = Math.floor(baseSize / (moduleCount + quietZone * 2));
    const qrContentSize = moduleSize * moduleCount;
    const qzPx = moduleSize * quietZone;
    const qrTotalSize = qrContentSize + qzPx * 2;

    const useFrame = frameToggle.checked;
    const labelText = frameLabelInput.value.trim();

    // Calculate final canvas size
    let canvasW, canvasH, qrOffX, qrOffY;
    const framePad = Math.round(qrTotalSize * 0.08);
    const labelH = Math.round(qrTotalSize * 0.1);

    if (!useFrame) {
      canvasW = qrTotalSize;
      canvasH = qrTotalSize;
      qrOffX = 0;
      qrOffY = 0;
    } else if (currentFrame === 'card') {
      canvasW = qrTotalSize + framePad * 2;
      canvasH = qrTotalSize + framePad * 2 + (labelText ? labelH : 0);
      qrOffX = framePad;
      qrOffY = framePad;
    } else if (currentFrame === 'viewfinder') {
      const extraPad = Math.round(qrTotalSize * 0.06);
      canvasW = qrTotalSize + extraPad * 2;
      canvasH = qrTotalSize + extraPad * 2 + (labelText ? labelH : 0);
      qrOffX = extraPad;
      qrOffY = extraPad;
    } else if (currentFrame === 'banner') {
      const bannerH = Math.round(qrTotalSize * 0.13);
      canvasW = qrTotalSize + framePad * 2;
      canvasH = qrTotalSize + framePad * 2 + bannerH;
      qrOffX = framePad;
      qrOffY = framePad;
    }

    previewCanvas.width = canvasW;
    previewCanvas.height = canvasH;
    const ctx = previewCanvas.getContext('2d');

    // --- Draw frame background ---
    if (useFrame && currentFrame === 'card') {
      ctx.fillStyle = '#ffffff';
      roundedRect(ctx, 0, 0, canvasW, canvasH, 24);
      ctx.fill();
      // Subtle border
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 2;
      roundedRect(ctx, 1, 1, canvasW - 2, canvasH - 2, 24);
      ctx.stroke();
    } else if (useFrame && currentFrame === 'viewfinder') {
      // White background for QR area
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvasW, canvasH);
    } else if (useFrame && currentFrame === 'banner') {
      ctx.fillStyle = '#ffffff';
      roundedRect(ctx, 0, 0, canvasW, canvasH, 24);
      ctx.fill();
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 2;
      roundedRect(ctx, 1, 1, canvasW - 2, canvasH - 2, 24);
      ctx.stroke();
    }

    // --- Draw QR white background ---
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(qrOffX, qrOffY, qrTotalSize, qrTotalSize);

    // --- Draw QR modules ---
    const gap = moduleSize * 0.12;
    const dotSize = moduleSize - gap;
    const dotR = dotSize * 0.28;
    const mX = qrOffX + qzPx;
    const mY = qrOffY + qzPx;

    // Logo zone calculation — clear area includes padding around the logo
    // so no dots overlap the white background behind the logo
    const logoZoneFrac = 0.28;
    const logoPadModules = 1;
    const logoZoneStart = Math.floor(moduleCount * (0.5 - logoZoneFrac / 2)) - logoPadModules;
    const logoZoneEnd = Math.ceil(moduleCount * (0.5 + logoZoneFrac / 2)) + logoPadModules;

    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (isFinderPattern(row, col, moduleCount)) continue;
        if (logoImg && row >= logoZoneStart && row < logoZoneEnd &&
            col >= logoZoneStart && col < logoZoneEnd) continue;
        if (!qr.isDark(row, col)) continue;

        ctx.fillStyle = dotColor;
        const dx = mX + col * moduleSize + gap / 2;
        const dy = mY + row * moduleSize + gap / 2;
        roundedRect(ctx, dx, dy, dotSize, dotSize, dotR);
        ctx.fill();
      }
    }

    // --- Draw finder patterns ---
    const fpSize = moduleSize * 7;
    drawFinderPattern(ctx, mX, mY, fpSize, eyeColor);
    drawFinderPattern(ctx, mX + (moduleCount - 7) * moduleSize, mY, fpSize, eyeColor);
    drawFinderPattern(ctx, mX, mY + (moduleCount - 7) * moduleSize, fpSize, eyeColor);

    // --- Draw logo ---
    if (logoImg) {
      const logoDisplaySize = qrContentSize * logoZoneFrac;
      const logoPad = logoDisplaySize * 0.08;
      const logoX = mX + (qrContentSize - logoDisplaySize) / 2;
      const logoY = mY + (qrContentSize - logoDisplaySize) / 2;

      // White rounded rect behind logo
      ctx.fillStyle = '#ffffff';
      roundedRect(ctx, logoX - logoPad, logoY - logoPad,
        logoDisplaySize + logoPad * 2, logoDisplaySize + logoPad * 2,
        logoPad * 2);
      ctx.fill();

      // Fit logo maintaining aspect ratio
      const aspect = logoImg.naturalWidth / logoImg.naturalHeight;
      let drawW, drawH, drawX, drawY;
      if (aspect >= 1) {
        drawW = logoDisplaySize;
        drawH = logoDisplaySize / aspect;
        drawX = logoX;
        drawY = logoY + (logoDisplaySize - drawH) / 2;
      } else {
        drawH = logoDisplaySize;
        drawW = logoDisplaySize * aspect;
        drawX = logoX + (logoDisplaySize - drawW) / 2;
        drawY = logoY;
      }

      // Clip to rounded rect
      ctx.save();
      roundedRect(ctx, drawX, drawY, drawW, drawH, logoPad);
      ctx.clip();
      ctx.drawImage(logoImg, drawX, drawY, drawW, drawH);
      ctx.restore();
    }

    // --- Draw frame decorations ---
    if (useFrame && currentFrame === 'card' && labelText) {
      const fontSize = Math.round(qrTotalSize * 0.055);
      ctx.fillStyle = labelColor;
      ctx.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(labelText, canvasW / 2, qrOffY + qrTotalSize + labelH / 2);
    }

    if (useFrame && currentFrame === 'viewfinder') {
      const cornerLen = Math.round(qrTotalSize * 0.15);
      const lw = Math.round(qrTotalSize * 0.025);
      const inset = Math.round(qrOffX * 0.3);
      const x1 = inset;
      const y1 = inset;
      const x2 = canvasW - inset;
      const y2Limit = canvasH - (labelText ? labelH : 0) - inset;

      ctx.strokeStyle = labelColor;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';

      // Top-left
      ctx.beginPath();
      ctx.moveTo(x1, y1 + cornerLen);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x1 + cornerLen, y1);
      ctx.stroke();
      // Top-right
      ctx.beginPath();
      ctx.moveTo(x2 - cornerLen, y1);
      ctx.lineTo(x2, y1);
      ctx.lineTo(x2, y1 + cornerLen);
      ctx.stroke();
      // Bottom-left
      ctx.beginPath();
      ctx.moveTo(x1, y2Limit - cornerLen);
      ctx.lineTo(x1, y2Limit);
      ctx.lineTo(x1 + cornerLen, y2Limit);
      ctx.stroke();
      // Bottom-right
      ctx.beginPath();
      ctx.moveTo(x2 - cornerLen, y2Limit);
      ctx.lineTo(x2, y2Limit);
      ctx.lineTo(x2, y2Limit - cornerLen);
      ctx.stroke();

      if (labelText) {
        const fontSize = Math.round(qrTotalSize * 0.05);
        ctx.fillStyle = labelColor;
        ctx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(labelText, canvasW / 2, canvasH - labelH / 2);
      }
    }

    if (useFrame && currentFrame === 'banner') {
      const bannerH = Math.round(qrTotalSize * 0.13);
      const bannerY = canvasH - bannerH;
      const bannerR = 24;

      // Banner strip at bottom
      ctx.fillStyle = labelColor;
      ctx.beginPath();
      ctx.moveTo(0, bannerY);
      ctx.lineTo(canvasW, bannerY);
      ctx.lineTo(canvasW, canvasH - bannerR);
      ctx.quadraticCurveTo(canvasW, canvasH, canvasW - bannerR, canvasH);
      ctx.lineTo(bannerR, canvasH);
      ctx.quadraticCurveTo(0, canvasH, 0, canvasH - bannerR);
      ctx.lineTo(0, bannerY);
      ctx.closePath();
      ctx.fill();

      if (labelText) {
        const fontSize = Math.round(qrTotalSize * 0.055);
        ctx.fillStyle = '#ffffff';
        ctx.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(labelText, canvasW / 2, bannerY + bannerH / 2);
      }
    }
  }

  // --- Debounced render ---

  function scheduleRender() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(render, 120);
  }

  // --- Logo handling ---

  function setLogo(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        logoImg = img;
        palette = extractPalette(img);
        renderPalette();
        if (palette.length > 0) {
          dotColor = palette[0];
          dotColorInput.value = dotColor;
          eyeColor = palette.length > 1 ? palette[1] : palette[0];
          eyeColorInput.value = eyeColor;
          labelColor = palette[0];
          labelColorInput.value = labelColor;
        }
        removeLogo.style.display = '';
        logoHint.style.display = 'none';
        render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function clearLogo() {
    logoImg = null;
    palette = [];
    dotColor = '#000000';
    eyeColor = '#000000';
    labelColor = '#000000';
    dotColorInput.value = '#000000';
    eyeColorInput.value = '#000000';
    labelColorInput.value = '#000000';
    renderPalette();
    removeLogo.style.display = 'none';
    logoInput.value = '';
    render();
  }

  // --- Events ---

  urlInput.addEventListener('input', scheduleRender);

  logoInput.addEventListener('change', function(e) {
    if (e.target.files[0]) setLogo(e.target.files[0]);
  });

  removeLogo.addEventListener('click', clearLogo);

  // Color inputs
  dotColorInput.addEventListener('input', function() {
    dotColor = dotColorInput.value;
    render();
  });
  eyeColorInput.addEventListener('input', function() {
    eyeColor = eyeColorInput.value;
    render();
  });

  // Swatch clicks
  dotSwatches.addEventListener('click', function(e) {
    var btn = e.target.closest('.swatch');
    if (!btn) return;
    dotColor = btn.dataset.color;
    dotColorInput.value = dotColor;
    render();
  });
  eyeSwatches.addEventListener('click', function(e) {
    var btn = e.target.closest('.swatch');
    if (!btn) return;
    eyeColor = btn.dataset.color;
    eyeColorInput.value = eyeColor;
    render();
  });
  labelColorInput.addEventListener('input', function() {
    labelColor = labelColorInput.value;
    render();
  });
  labelSwatches.addEventListener('click', function(e) {
    var btn = e.target.closest('.swatch');
    if (!btn) return;
    labelColor = btn.dataset.color;
    labelColorInput.value = labelColor;
    render();
  });

  // Logo drag-and-drop onto preview area
  ['dragenter', 'dragover'].forEach(function(name) {
    previewArea.addEventListener(name, function(e) {
      e.preventDefault();
      e.stopPropagation();
      previewArea.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(function(name) {
    previewArea.addEventListener(name, function(e) {
      e.preventDefault();
      e.stopPropagation();
      previewArea.classList.remove('drag-over');
    });
  });
  previewArea.addEventListener('drop', function(e) {
    var file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) setLogo(file);
  });

  // Frame toggle
  frameToggle.addEventListener('change', function() {
    frameOptions.style.display = frameToggle.checked ? '' : 'none';
    labelColorRow.style.display = frameToggle.checked ? '' : 'none';
    render();
  });

  // Frame presets
  framePresets.addEventListener('click', function(e) {
    var btn = e.target.closest('.frame-btn');
    if (!btn) return;
    framePresets.querySelectorAll('.frame-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    btn.classList.add('active');
    currentFrame = btn.dataset.frame;
    render();
  });

  frameLabelInput.addEventListener('input', scheduleRender);

  // Download
  downloadBtn.addEventListener('click', function() {
    previewCanvas.toBlob(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'qr-code.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }, 'image/png');
  });

  // Prevent browser opening files dropped outside zones
  window.addEventListener('dragover', function(e) { e.preventDefault(); });
  window.addEventListener('drop', function(e) { e.preventDefault(); });
</script>
</body>
</html>
