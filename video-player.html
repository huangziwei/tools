<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Player</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111418;
    --muted: #6b7280;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --panel: #f8fafc;
    --panel-active: #eff6ff;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --code-bg: #f1f5f9;
    --error: #b91c1c;
    --error-bg: #fef2f2;
    --error-border: #fecaca;
    --warn: #92400e;
    --warn-bg: #fffbeb;
    --warn-border: #fde68a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0d10;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --border: #262a30;
      --border-strong: #3a3f47;
      --panel: #14171c;
      --panel-active: #17253f;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --code-bg: #1a1f26;
      --error: #fca5a5;
      --error-bg: #1f0e0f;
      --error-border: #7f1d1d;
      --warn: #fcd34d;
      --warn-bg: #1f1606;
      --warn-border: #78350f;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main { width: 100%; max-width: 720px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin: 0 0 0.5rem; }
  h1 { font-size: 1.75rem; font-weight: 600; margin: 0; letter-spacing: -0.02em; }
  .github-link { color: var(--muted); display: flex; }
  .github-link:hover { color: var(--fg); text-decoration: none; }
  p.lead { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  .drop-zone {
    display: block;
    border: 2px dashed var(--border-strong);
    border-radius: 12px;
    padding: 2.25rem 1.5rem;
    text-align: center;
    background: var(--panel);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--panel-active);
  }
  .drop-zone:focus-within {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
  .drop-icon { width: 36px; height: 36px; color: var(--muted); margin-bottom: 0.6rem; }
  .drop-text { font-size: 0.98rem; margin: 0 0 0.2rem; }
  .drop-text strong { font-weight: 600; }
  .drop-hint { color: var(--muted); font-size: 0.82rem; margin: 0; }

  input[type="file"] {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  .player video {
    width: 100%;
    max-height: 70vh;
    background: #000;
    border-radius: 10px;
    display: block;
  }
  .video-info {
    margin-top: 0.85rem;
    font-size: 0.85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    line-height: 1.5;
  }
  .video-info strong {
    color: var(--fg);
    font-weight: 500;
    word-break: break-word;
  }

  .controls-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .btn-secondary {
    padding: 0.5rem 0.95rem;
    font-size: 0.85rem;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--panel);
    color: var(--fg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-secondary:hover { border-color: var(--accent); background: var(--panel-active); }
  .btn-secondary svg { width: 14px; height: 14px; }

  .subtitle-info {
    margin-top: 0.85rem;
    padding: 0.55rem 0.85rem;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
    font-size: 0.82rem;
    color: var(--muted);
    display: none;
    align-items: center;
    gap: 0.5rem;
  }
  .subtitle-info strong { color: var(--fg); font-weight: 500; word-break: break-all; }
  .subtitle-info .clear-sub {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    padding: 0;
    font: inherit;
    font-size: 0.82rem;
  }
  .subtitle-info .clear-sub:hover { color: var(--accent-hover); text-decoration: underline; }

  .status {
    margin-top: 1rem;
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    font-size: 0.85rem;
    display: none;
    line-height: 1.5;
  }
  .status.busy {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    display: block;
  }
  .status.error {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error);
    display: block;
  }
  .status.warn {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    color: var(--warn);
    display: block;
  }

  .spinner {
    display: inline-block;
    width: 11px;
    height: 11px;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin-right: 0.5rem;
    vertical-align: -1px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <div class="page-header">
    <h1>Video Player</h1>
    <!-- SOURCE_LINK_START --><a href="https://github.com/huangziwei/tools/blob/main/video-player.html" target="_blank" rel="noopener" class="github-link" title="View source on GitHub"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a><!-- SOURCE_LINK_END -->
  </div>
  <p class="lead">Play video files with subtitles. MKV and AVI convert on-device via ffmpeg.wasm; AirPlay works on Safari.</p>

  <label class="drop-zone" id="dropZone" for="videoInput">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
    <p class="drop-text"><strong>Drop a video here</strong> or click to choose</p>
    <p class="drop-hint">MP4, MOV, WebM play directly. MKV, AVI, TS convert on-device. Drop SRT or VTT alongside for subtitles.</p>
    <input type="file" id="videoInput" accept="video/*,.mkv,.avi,.flv,.ts,.wmv,.mpg,.mpeg,.3gp,.m2ts,.mts">
  </label>

  <div class="status" id="status"></div>

  <div class="player" id="playerSection" style="display:none">
    <video id="video" controls playsinline x-webkit-airplay="allow"></video>

    <div class="video-info" id="videoInfo"></div>

    <div class="subtitle-info" id="subtitleInfo">
      <span>Subtitles: <strong id="subtitleName"></strong></span>
      <button type="button" class="clear-sub" id="clearSubtitles">remove</button>
    </div>

    <div class="controls-row">
      <button type="button" class="btn-secondary" id="subtitleBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <line x1="6" y1="10" x2="10" y2="10"/>
          <line x1="14" y1="10" x2="18" y2="10"/>
          <line x1="6" y1="14" x2="14" y2="14"/>
        </svg>
        Add subtitles
      </button>
      <button type="button" class="btn-secondary" id="airplayBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 17H3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>
          <polygon points="12 13 7 21 17 21 12 13"/>
        </svg>
        AirPlay
      </button>
      <button type="button" class="btn-secondary" id="changeBtn">Open another file</button>
    </div>

    <input type="file" id="subtitleInput" accept=".srt,.vtt,.webvtt,text/vtt">
  </div>

  <footer>
    All data stays on your device.<br>
    <!-- TOOL_META_START --><!-- TOOL_META_END -->
  </footer>
</main>

<script>
  const dropZone = document.getElementById('dropZone');
  const videoInput = document.getElementById('videoInput');
  const playerSection = document.getElementById('playerSection');
  const video = document.getElementById('video');
  const videoInfo = document.getElementById('videoInfo');
  const statusEl = document.getElementById('status');
  const subtitleBtn = document.getElementById('subtitleBtn');
  const subtitleInput = document.getElementById('subtitleInput');
  const subtitleInfo = document.getElementById('subtitleInfo');
  const subtitleName = document.getElementById('subtitleName');
  const clearSubtitles = document.getElementById('clearSubtitles');
  const airplayBtn = document.getElementById('airplayBtn');
  const changeBtn = document.getElementById('changeBtn');

  // Containers that browsers can't play natively — always remux.
  const REMUX_EXTS = new Set([
    'mkv', 'avi', 'flv', 'ts', 'mts', 'm2ts', 'wmv', 'mpg', 'mpeg', 'asf', 'rmvb', 'vob', 'divx'
  ]);
  const VIDEO_EXTS = new Set([
    'mp4', 'm4v', 'mov', 'webm', 'ogv', 'ogg',
    ...REMUX_EXTS,
  ]);
  const SUBTITLE_EXTS = new Set(['srt', 'vtt', 'webvtt']);

  function classifyFile(file) {
    const ext = fileExt(file.name);
    if (VIDEO_EXTS.has(ext) || (file.type && file.type.startsWith('video/'))) return 'video';
    if (SUBTITLE_EXTS.has(ext) || file.type === 'text/vtt') return 'subtitle';
    return 'unknown';
  }

  function handleFiles(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;
    let videoFile = null;
    let subtitleFile = null;
    for (const f of files) {
      const kind = classifyFile(f);
      if (kind === 'video' && !videoFile) videoFile = f;
      else if (kind === 'subtitle' && !subtitleFile) subtitleFile = f;
    }
    if (videoFile) {
      loadVideo(videoFile);
      if (subtitleFile) loadSubtitle(subtitleFile);
    } else if (subtitleFile) {
      if (currentVideoUrl) {
        loadSubtitle(subtitleFile);
      } else {
        setStatus('error', 'Drop a video first — subtitles attach to a loaded video.');
      }
    } else {
      setStatus('error', 'Unsupported file. Drop a video, or an SRT/VTT subtitle.');
    }
  }

  let currentVideoUrl = null;
  let currentSubtitleUrl = null;
  let ffmpeg = null;
  let ffmpegLoading = null;
  let loadToken = 0;

  function setStatus(kind, html) {
    if (!kind) {
      statusEl.className = 'status';
      statusEl.innerHTML = '';
      return;
    }
    statusEl.className = 'status ' + kind;
    statusEl.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function formatBytes(n) {
    if (n < 1000) return n + ' B';
    if (n < 1e6) return Math.round(n / 1000) + ' KB';
    if (n < 1e9) return (n / 1e6).toFixed(1) + ' MB';
    return (n / 1e9).toFixed(2) + ' GB';
  }

  function formatDuration(seconds) {
    if (!isFinite(seconds) || seconds <= 0) return '';
    const s = Math.floor(seconds);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const pad = n => String(n).padStart(2, '0');
    return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
  }

  function fileExt(name) {
    const m = /\.([^.]+)$/.exec(name);
    return m ? m[1].toLowerCase() : '';
  }

  function revokeVideoUrl() {
    if (currentVideoUrl) {
      URL.revokeObjectURL(currentVideoUrl);
      currentVideoUrl = null;
    }
  }

  function revokeSubtitleUrl() {
    if (currentSubtitleUrl) {
      URL.revokeObjectURL(currentSubtitleUrl);
      currentSubtitleUrl = null;
    }
    video.querySelectorAll('track').forEach(t => t.remove());
  }

  function showPlayer() {
    dropZone.style.display = 'none';
    playerSection.style.display = '';
  }

  function resetToDropZone() {
    loadToken++;
    playerSection.style.display = 'none';
    dropZone.style.display = '';
    revokeVideoUrl();
    revokeSubtitleUrl();
    video.removeAttribute('src');
    video.load();
    videoInput.value = '';
    subtitleInput.value = '';
    subtitleInfo.style.display = 'none';
    setStatus(null);
    videoInfo.innerHTML = '';
  }

  async function loadVideo(file) {
    const token = ++loadToken;
    revokeVideoUrl();
    revokeSubtitleUrl();
    subtitleInfo.style.display = 'none';
    subtitleInput.value = '';
    setStatus(null);
    videoInfo.innerHTML = `<strong>${escapeHtml(file.name)}</strong><br>${formatBytes(file.size)}`;
    showPlayer();

    const ext = fileExt(file.name);

    if (REMUX_EXTS.has(ext)) {
      await remuxAndPlay(file, token);
      return;
    }

    // Try native playback for everything else. Fall back to remux on "format not supported".
    const url = URL.createObjectURL(file);
    currentVideoUrl = url;

    const onError = async () => {
      if (token !== loadToken) return;
      video.removeEventListener('error', onError);
      video.removeEventListener('loadedmetadata', onLoaded);
      // Fall back to remux on any native error — usually unsupported format
      // or a codec the browser can't decode (e.g. HEVC-in-MP4 on Firefox).
      revokeVideoUrl();
      await remuxAndPlay(file, token);
    };
    const onLoaded = () => {
      if (token !== loadToken) return;
      updateVideoInfo(file);
    };

    video.addEventListener('error', onError);
    video.addEventListener('loadedmetadata', onLoaded);
    video.src = url;
  }

  async function remuxAndPlay(file, token) {
    const sizeGB = file.size / 1e9;
    if (sizeGB > 3) {
      setStatus('warn', `This file is ${sizeGB.toFixed(1)} GB. The browser may run out of memory during conversion — try a smaller file if it crashes.`);
    }

    try {
      setStatus('busy', '<span class="spinner"></span>Loading converter…');
      const ff = await ensureFFmpeg();
      if (token !== loadToken) return;

      setStatus('busy', '<span class="spinner"></span>Reading file…');
      const arr = new Uint8Array(await file.arrayBuffer());
      if (token !== loadToken) return;

      const ext = fileExt(file.name) || 'mkv';
      const inName = 'input.' + ext;
      const outName = 'output.mp4';

      await ff.writeFile(inName, arr);
      if (token !== loadToken) return;

      const onProgress = ({ progress }) => {
        if (token !== loadToken) return;
        const pct = Math.max(0, Math.min(100, Math.round(progress * 100)));
        setStatus('busy', `<span class="spinner"></span>Converting… ${pct}%`);
      };
      ff.on('progress', onProgress);

      try {
        // Stream-copy video (fast, no quality loss). Re-encode audio to AAC so
        // AC3/EAC3/DTS tracks also play in Firefox. Strip subtitle streams —
        // load an external SRT/VTT instead.
        await ff.exec([
          '-i', inName,
          '-c:v', 'copy',
          '-c:a', 'aac',
          '-b:a', '192k',
          '-sn',
          '-movflags', '+faststart',
          outName,
        ]);
      } finally {
        ff.off('progress', onProgress);
      }
      if (token !== loadToken) return;

      const data = await ff.readFile(outName);
      try { await ff.deleteFile(inName); } catch {}
      try { await ff.deleteFile(outName); } catch {}
      if (token !== loadToken) return;

      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      currentVideoUrl = url;

      const onError = () => {
        if (token !== loadToken) return;
        setStatus('error', 'Converted file cannot play. The video codec may not be supported by this browser (try Safari for HEVC).');
      };
      const onLoaded = () => {
        if (token !== loadToken) return;
        updateVideoInfo(file, blob.size);
        setStatus(null);
      };
      video.addEventListener('error', onError, { once: true });
      video.addEventListener('loadedmetadata', onLoaded, { once: true });
      video.src = url;
    } catch (err) {
      if (token !== loadToken) return;
      console.error(err);
      setStatus('error', 'Conversion failed: ' + escapeHtml(err.message || String(err)));
    }
  }

  function updateVideoInfo(file, convertedSize) {
    const parts = [`<strong>${escapeHtml(file.name)}</strong>`];
    const meta = [];
    const dur = formatDuration(video.duration);
    if (dur) meta.push(dur);
    if (video.videoWidth) meta.push(`${video.videoWidth}×${video.videoHeight}`);
    meta.push(formatBytes(file.size));
    if (convertedSize) meta.push(`→ ${formatBytes(convertedSize)} MP4`);
    parts.push(meta.join(' · '));
    videoInfo.innerHTML = parts.join('<br>');
  }

  async function ensureFFmpeg() {
    if (ffmpeg) return ffmpeg;
    if (ffmpegLoading) return ffmpegLoading;

    ffmpegLoading = (async () => {
      if (!window.FFmpegWASM) {
        await loadScript('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js');
      }
      const { FFmpeg } = window.FFmpegWASM;
      const inst = new FFmpeg();
      const base = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
      const [coreURL, wasmURL] = await Promise.all([
        toBlobURL(`${base}/ffmpeg-core.js`, 'text/javascript'),
        toBlobURL(`${base}/ffmpeg-core.wasm`, 'application/wasm'),
      ]);
      await inst.load({ coreURL, wasmURL });
      ffmpeg = inst;
      return inst;
    })();

    try {
      return await ffmpegLoading;
    } catch (err) {
      ffmpegLoading = null;
      throw err;
    }
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load ' + src));
      document.head.appendChild(s);
    });
  }

  async function toBlobURL(url, type) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Failed to fetch ${url}: ${resp.status}`);
    const buf = await resp.arrayBuffer();
    return URL.createObjectURL(new Blob([buf], { type }));
  }

  function srtToVtt(srt) {
    const text = srt.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    // SRT timestamps use "," for millis; VTT uses ".".
    const converted = text.replace(/(\d\d:\d\d:\d\d),(\d\d\d)/g, '$1.$2');
    return 'WEBVTT\n\n' + converted;
  }

  async function loadSubtitle(file) {
    try {
      const text = await file.text();
      const ext = fileExt(file.name);
      let vtt;
      if (ext === 'vtt' || ext === 'webvtt' || /^WEBVTT/.test(text)) {
        vtt = text;
      } else if (ext === 'srt' || /\d\d:\d\d:\d\d,\d\d\d\s+-->/.test(text)) {
        vtt = srtToVtt(text);
      } else {
        setStatus('error', 'Unsupported subtitle format. Use SRT or WebVTT.');
        return;
      }

      revokeSubtitleUrl();
      const blob = new Blob([vtt], { type: 'text/vtt' });
      currentSubtitleUrl = URL.createObjectURL(blob);

      const track = document.createElement('track');
      track.kind = 'subtitles';
      track.label = file.name;
      track.srclang = 'und';
      track.default = true;
      track.src = currentSubtitleUrl;
      track.addEventListener('load', () => {
        if (track.track) track.track.mode = 'showing';
      }, { once: true });
      video.appendChild(track);

      subtitleName.textContent = file.name;
      subtitleInfo.style.display = 'flex';
    } catch (err) {
      setStatus('error', 'Could not read subtitle: ' + escapeHtml(err.message || String(err)));
    }
  }

  // --- Events ---

  videoInput.addEventListener('change', e => {
    if (e.target.files && e.target.files.length) handleFiles(e.target.files);
  });

  // Drop zone visual feedback — actual drop is handled at window level below
  // so users can also drop subtitles onto the player after a video is loaded.
  ['dragenter', 'dragover'].forEach(n => {
    dropZone.addEventListener(n, e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  subtitleBtn.addEventListener('click', () => subtitleInput.click());
  subtitleInput.addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if (f) loadSubtitle(f);
  });
  clearSubtitles.addEventListener('click', () => {
    revokeSubtitleUrl();
    subtitleInfo.style.display = 'none';
    subtitleInput.value = '';
  });

  changeBtn.addEventListener('click', resetToDropZone);

  // AirPlay — Safari only. Button appears when a target (Apple TV, HomePod) is reachable.
  if (typeof video.webkitShowPlaybackTargetPicker === 'function') {
    video.addEventListener('webkitplaybacktargetavailabilitychanged', e => {
      airplayBtn.style.display = e.availability === 'available' ? '' : 'none';
    });
    airplayBtn.addEventListener('click', () => {
      try { video.webkitShowPlaybackTargetPicker(); } catch {}
    });
  }

  // Window-wide drop: accept video + subtitle anywhere on the page.
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
      handleFiles(e.dataTransfer.files);
    }
  });
</script>
</body>
</html>
